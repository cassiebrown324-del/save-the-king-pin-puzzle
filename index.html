<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Save the King — Royal Rescue Match</title><style>*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#8558ff,#160829 60%,#050008);color:#fff4c8;font-family:system-ui,Segoe UI,sans-serif}#app{max-width:620px;margin:auto;min-height:100dvh;padding:10px;display:grid;gap:8px;grid-template-rows:auto 230px auto auto 1fr auto}.card,.scene,.goals,.tools,.board,.hud,.map{background:#13051fcc;border:1px solid #fff3;border-radius:18px;box-shadow:0 12px 28px #0008}.top,.hud{display:flex;justify-content:space-between;align-items:center;font-weight:900}.scene{position:relative;overflow:hidden;padding:8px}.danger{position:absolute;inset:auto 0 0;height:40%;animation:rise 1.3s infinite alternate}.lava{background:linear-gradient(#ffe86b,#ff5a1d,#72061d)}.water{background:linear-gradient(#bffaff,#168adc,#06265a)}.fire{background:linear-gradient(#fff06a,#ff4322,#640606)}.ice{background:linear-gradient(#f6ffff,#85c7ff,#304da8)}.venom{background:linear-gradient(#dbff69,#29b84e,#062d19)}.dark{background:linear-gradient(#eee,#666,#111)}.sand{background:linear-gradient(#fff0a6,#d79738,#56300c)}.storm{background:linear-gradient(#e6fbff,#526dff,#14083e)}@keyframes rise{to{height:50%;filter:brightness(1.2)}}.king{position:absolute;left:50%;top:48%;translate:-50% -50%;font-size:78px;z-index:4;animation:bob .75s infinite alternate;filter:drop-shadow(0 10px 12px #000)}.king:after{content:'HELP!';position:absolute;top:-10px;left:50%;translate:-50%;background:white;color:#d51b3f;border-radius:99px;padding:3px 8px;font-size:11px}.haz{position:absolute;right:22px;top:48px;font-size:62px;z-index:3;animation:bob .65s infinite alternate-reverse}.copy,.warn{position:absolute;z-index:7;left:8px;right:8px;text-align:center;background:#000b;border:1px solid #fff5;border-radius:14px;padding:7px;font-weight:900}.warn{top:50px;left:50%;right:auto;translate:-50%;white-space:nowrap;background:linear-gradient(90deg,#ff2e55,#ffac21)}.copy{top:8px}.panel{position:absolute;top:86px;z-index:6;background:#08020fcc;border:1px solid #ffd96666;border-radius:14px;padding:7px;font-size:11px;font-weight:900}.left{left:8px;width:170px}.right{right:8px;width:178px}.pill{display:inline-block;border-radius:99px;background:#de2849;padding:4px 8px}.open{background:#19b870}.row{display:flex;justify-content:space-between;gap:6px;margin-top:5px;padding:4px 5px;background:#0009;border:1px solid #fff2;border-radius:10px}.done{background:#0d5539}.bar{height:8px;background:#08020d;border-radius:99px;overflow:hidden;margin-top:5px}.bar b{display:block;height:100%;background:linear-gradient(90deg,#45ffb2,#ffe56e,#ff3155)}.prop{position:absolute;font-size:30px;filter:drop-shadow(0 5px 8px #000)}@keyframes bob{to{transform:translateY(8px) rotate(-2deg)}}.goals,.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:7px}.tools{grid-template-columns:repeat(4,1fr)}button small{display:block;font-size:10px;line-height:1.05}.cannonReady{animation:bob .45s infinite alternate;filter:saturate(1.45)}.goal{background:#07020e;border:1px solid #fff2;border-radius:13px;padding:6px;font-weight:900;font-size:12px}button{border:0;border-radius:13px;background:linear-gradient(#fff6bd,#ffc22d);color:#361321;font-weight:900;padding:8px 6px;box-shadow:0 4px 0 #7d4b04}button:disabled{filter:grayscale(1);opacity:.45}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:8px}.tile{aspect-ratio:1;border-radius:13px;display:grid;place-items:center;font-size:27px;background:linear-gradient(145deg,#fff8,#0003),var(--bg);border:2px solid #ffffff50;box-shadow:inset 0 4px 8px #fff5,0 5px 0 #0007;user-select:none}.need{outline:4px solid #fff0a7}.sel{outline:5px solid white}.block{background:linear-gradient(145deg,#a87947,#39200f)}.hole{background:#050208;color:#fff2;border-color:#ffffff12;box-shadow:none}.pow{box-shadow:0 0 23px #fff,inset 0 4px 8px #fff8}.msg{text-align:center;font-weight:900;color:#fff3a8}.map{display:none;position:absolute;z-index:30;left:8px;right:8px;bottom:54px;max-height:55dvh;overflow:auto;padding:8px;grid-template-columns:1fr 1fr;gap:7px}.map.show{display:grid}.node{border:2px solid #ffd96677;border-radius:16px;padding:9px;background:#12061d;text-align:center;font-weight:900}.locked{filter:grayscale(1);opacity:.45}.toast{position:absolute;z-index:50;left:50%;top:50%;translate:-50% -50%;font-size:26px;font-weight:900;text-shadow:0 4px 10px #000;animation:toast .85s forwards}@keyframes toast{to{opacity:0;transform:translateY(-44px) scale(1.2)}}.shake{animation:shake .18s 4}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}@media(max-height:760px){#app{grid-template-rows:auto 185px auto auto 1fr auto}.tile{font-size:23px}.goals{grid-template-columns:repeat(2,1fr)}}</style></head><body><div id="app"><div class="top card"><div id="title"></div><div id="moves"></div></div><div id="scene" class="scene"><div id="copy" class="copy"></div><div id="warn" class="warn"></div><div id="danger" class="danger lava"></div><div id="haz" class="haz"></div><div class="king">🤴</div><div id="props"></div><div id="pins" class="panel left"></div><div id="beats" class="panel right"></div></div><div id="goals" class="goals"></div><div id="tools" class="tools"></div><div id="board" class="board"></div><div id="msg" class="msg"></div><div class="hud card"><button onclick="showMap()">🗺 Map</button><span id="score"></span><button onclick="start(lvl)">↻</button><button id="next" onclick="start(Math.min(lvl+1,levels.length-1))">Next ▶</button></div><div id="map" class="map"></div></div><script>(()=>{const E=['💧','🪢','🔥','🔑','🔨','🛡️'],N=['Water','Rope','Fire','Key','Hammer','Shield'],BG=['#13a9ef','#b06a22','#ef3c25','#718095','#744fe2'];</script></body></html>
