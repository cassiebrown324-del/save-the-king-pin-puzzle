<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Save the King — Royal Rescue Match</title><style>
*{box-sizing:border-box}body{margin:0;height:100dvh;overflow:hidden;background:radial-gradient(circle at 50% -10%,#8558ff,#210b36 55%,#07020d);font-family:ui-rounded,system-ui,Segoe UI,sans-serif;color:#fff2c6}#app{width:min(560px,100vw);height:100%;margin:auto;padding:8px;display:flex;flex-direction:column;gap:7px}.card,.bar,.goals,.tools,.map{background:#160623dc;border:1px solid #ffffff28;border-radius:18px;box-shadow:0 12px 28px #0008}.bar{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;font-weight:1000}.scene{position:relative;height:220px;overflow:hidden;border-radius:24px;border:3px solid #ffffff28;background:linear-gradient(#392064,#15071f);box-shadow:inset 0 0 80px #000,0 14px 26px #0008}.copy{position:absolute;z-index:6;left:8px;right:8px;top:8px;text-align:center;background:#0009;border:1px solid #fff3;border-radius:13px;padding:7px;font-weight:1000}.danger{position:absolute;left:0;right:0;bottom:0;height:34%;background:linear-gradient(#ffe263,#ff6b20,#8d112d);animation:rise 2s infinite alternate}.water{background:linear-gradient(#abfbff,#1389d7,#053e78)}.fire{background:linear-gradient(#fff071,#ff3d20,#880606)}.ice{background:linear-gradient(#efffff,#91c8ff,#3c64ca)}.venom{background:linear-gradient(#c7ff5c,#21a84b,#064526)}.dark{background:linear-gradient(#e8e8e8,#5e6370,#15151c)}@keyframes rise{to{height:45%;filter:brightness(1.18)}}.king{position:absolute;z-index:5;left:50%;top:46%;translate:-50% -50%;font-size:78px;filter:drop-shadow(0 12px 14px #000);animation:bob 1s infinite alternate}.king:after{content:'HELP!';position:absolute;left:50%;top:-15px;translate:-50%;font-size:11px;background:#fff;color:#d51f39;border-radius:99px;padding:4px 8px}.haz{position:absolute;right:18px;top:42px;z-index:4;font-size:58px;animation:bob .75s infinite alternate-reverse}.pins{position:absolute;z-index:7;left:8px;top:74px;width:158px;background:#0e0519dd;border:1px solid #fff3;border-radius:16px;padding:7px;font-weight:1000}.badge{display:inline-block;background:#e6314d;border-radius:99px;padding:4px 7px;font-size:10px}.open{background:#21bf72}.pin{display:flex;justify-content:space-between;align-items:center;gap:4px;background:#0008;border:1px solid #fff2;border-radius:10px;padding:4px 6px;margin-top:4px;font-size:11px}.pin.done{background:#0d523a;color:#dffff0}.hint{font-size:10px;color:#ffefa0;margin-top:5px}.locks{position:absolute;z-index:7;left:8px;right:8px;bottom:8px;background:#0009;border:1px solid #fff3;border-radius:14px;padding:7px;text-align:center;font-weight:1000}.cinema{position:absolute;z-index:7;right:8px;top:74px;width:164px;background:#090313dd;border:1px solid #ffd96655;border-radius:16px;padding:7px;font-weight:1000;box-shadow:0 8px 18px #0008}.cinema h4{margin:0 0 5px;font-size:11px;color:#ffe782}.act{display:flex;align-items:center;gap:5px;background:#0008;border:1px solid #fff2;border-radius:10px;padding:4px 5px;margin-top:4px;font-size:10px}.act.done{background:#104d38;color:#dffff0}.peril{height:7px;background:#250313;border-radius:99px;overflow:hidden;margin-top:6px}.peril b{display:block;height:100%;background:linear-gradient(90deg,#27ffab,#ffe464,#ff3155)}.warn{position:absolute;z-index:8;left:50%;top:48px;translate:-50%;background:linear-gradient(90deg,#ff3155,#ff9a22);border-radius:99px;padding:6px 10px;font-size:12px;font-weight:1000;box-shadow:0 8px 18px #0008}.prop{position:absolute;font-size:30px;filter:drop-shadow(0 6px 8px #000)}.shake{animation:shake .22s 3}@keyframes bob{to{transform:translateY(9px) rotate(-2deg)}}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.goals{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:7px}.goal{background:#08020e;border:1px solid #ffffff24;border-radius:13px;padding:6px;font-weight:1000;font-size:12px}.row{display:flex;justify-content:space-between}.meter{height:7px;background:#050208;border-radius:99px;margin-top:5px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#4dffb3,#ffe86a)}.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:7px}.tools button,.hud button{border:0;border-radius:13px;background:linear-gradient(#fff5b8,#ffbf2f);color:#351421;font-weight:1000;padding:8px 6px;box-shadow:0 4px 0 #7b4a05}.tools small{display:block;font-size:10px}.tools button:disabled,.hud button:disabled{filter:grayscale(1);opacity:.45}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:#09030f;border:1px solid #ffffff1d;border-radius:20px;padding:8px;touch-action:none}.tile{aspect-ratio:1;border-radius:13px;display:grid;place-items:center;font-size:27px;border:2px solid #ffffff50;background:linear-gradient(145deg,var(--a),var(--b));box-shadow:inset 0 4px 8px #fff6,0 5px 0 #0007;user-select:none}.tile.goalTile{outline:4px solid #fff1a7;animation:pulse .8s infinite alternate}.tile.sel{outline:5px solid #fff}.tile.block{background:linear-gradient(145deg,#a87a4b,#39200f)}.tile.hole{background:#040208;color:#fff2;border-color:#ffffff12;box-shadow:none}.tile.power{box-shadow:0 0 23px #fff,inset 0 4px 8px #fff8}@keyframes pulse{to{filter:brightness(1.25)}}.hud{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:7px;font-weight:1000}.msg{text-align:center;min-height:22px;font-weight:1000;color:#fff3a8}.map{display:none;grid-template-columns:1fr 1fr;gap:7px;padding:8px;overflow:auto;max-height:44dvh}.map.show{display:grid}.node{border:2px solid #ffd96677;border-radius:16px;padding:9px;background:#12061d;text-align:center;font-weight:1000}.locknode{filter:grayscale(1);opacity:.45}.toast{position:absolute;z-index:20;left:50%;top:50%;translate:-50% -50%;font-size:25px;font-weight:1000;text-shadow:0 4px 10px #000;animation:toast .8s forwards}@keyframes toast{to{opacity:0;transform:translateY(-40px) scale(1.2)}}@media(max-height:760px){.scene{height:180px}.tile{font-size:23px}.goals{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div id="app"><div class="bar"><div id="title"></div><div id="moves"></div></div><div class="scene" id="scene"><div class="copy" id="copy"></div><div class="warn" id="warn"></div><div id="danger" class="danger"></div><div class="haz" id="haz"></div><div class="king">🤴</div><div id="props"></div><div class="pins" id="pins"></div><div class="cinema" id="cinema"></div><div class="locks" id="locks"></div></div><div class="goals" id="goals"></div><div class="tools" id="tools"></div><div class="board" id="board"></div><div class="msg" id="msg"></div><div class="hud card"><button onclick="showMap()">🗺 Map</button><span id="score"></span><button onclick="start(level)">↻</button><button id="next" onclick="start(Math.min(level+1,L.length-1))" disabled>Next ▶</button></div><div class="map" id="map"></div></div><script>
(()=>{const E=['💧','🪢','🔥','🔑','🔨','🛡️'],N=['Water','Rope','Fire','Key','Hammer','Shield'],C=[['#baf8ff','#168ee7'],['#ffe7a0','#a5601d'],['#ffd35f','#ef3428'],['#fff498','#d49a12'],['#e8f3ff','#657b90'],['#d4c2ff','#7044e5']];
const L=[['Lava Drop','🌋','danger','Cut rope chains before lava reaches the throne.',{1:10},3,1,'rope chains',20,'crate','Lava spits rubble','🔥'],['Flooded Cellar','🌊','danger water','Open drain valves with keys while floodwater rises.',{3:10,0:5},3,3,'drain valves',22,'crate','Flood reseals a valve','💦'],['Kitchen Fire','🔥','danger fire','Douse stove fires with water before smoke fills the kitchen.',{0:12},5,0,'stove fires',21,'crate','A stove reignites','🍳'],['Frozen Throne','🧊','danger ice','Melt ice seals with fire tiles and free the throne.',{2:12},4,2,'ice seals',23,'ice','Frost spreads','❄️'],['Dragon Bridge','🐉','danger fire','Repair bridge planks with hammers while dragon fire closes in.',{4:12,5:5},4,4,'bridge planks',24,'metal','Dragon burns a plank','🌉'],['Snake Pit','🐍','danger venom','Break venom cages with shields through tangled vines.',{5:12},5,5,'venom cages',22,'vine','Snakes wrap vines','🟢'],['Saw Trap','⚙️','danger dark','Smash saw controls with hammers before blades close.',{4:13},4,4,'saw controls',23,'metal','Saw gears jam','🪚'],['Tower Crush','📌','danger dark','Unlock ceiling pins with keys, then pull ropes.',{3:12,1:8},5,3,'ceiling pins',25,'metal','Ceiling drops','⛓️'],['Bee Swarm Garden','🐝','danger venom','Calm bee swarms with water and shield the king.',{0:12,5:8},5,5,'bee swarms',24,'vine','Bees add honeycomb','🍯'],['Mine Cart Collapse','⛏️','danger dark','Repair rail switches before boulders crush the cart.',{4:13,3:7},6,4,'rail switches',26,'metal','Boulders crack rails','🪨']];
let B=[],level=0,moves=0,goals={},startGoals={},locks=0,startLocks=0,sel=null,mode='play',score=0,combo=0,surge=4,tools={},unlocked=+(localStorage.krUnlock||1),stars=JSON.parse(localStorage.krStars||'[]');const $=id=>document.getElementById(id),R=n=>Math.floor(Math.random()*n),key=(c,r)=>c+','+r;
function holes(i){return new Set([[[3,3]],[[0,0],[6,6]],[[0,6],[6,0],[3,3]],[[1,1],[5,1],[1,5],[5,5]],[[3,0],[3,6]],[[0,3],[6,3],[3,3]],[[2,2],[4,2],[2,4],[4,4]],[[0,0],[6,0],[0,6],[6,6],[3,3]],[[1,0],[5,0],[0,3],[6,3],[1,6],[5,6]],[[2,0],[4,0],[3,3],[2,6],[4,6]]][i].map(p=>key(p[0],p[1])))}
function start(i=0){level=i;mode='play';sel=null;score=0;combo=0;surge=4;tools={hammer:1,splash:1,key:1};moves=L[i][8];goals={...L[i][4]};startGoals={...goals};locks=L[i][5];startLocks=locks;let H=holes(i);B=[];for(let r=0;r<7;r++)for(let c=0;c<7;c++){let h=H.has(key(c,r));B.push({c,r,h,block:!h&&R(10)<(i>5?3:2)?L[i][9]:'',type:R(6),power:''})}seed();draw();say('Save the king: '+L[i][3])}
function seed(){[L[level][6],...Object.keys(goals).map(Number)].forEach(k=>{for(let n=0;n<5;n++){let t=B.find(x=>!x.h&&!x.block&&x.type!==k);if(t)t.type=k}})}
function draw(){let l=L[level];$('title').textContent='👑 '+(level+1)+'/'+L.length+' '+l[0];$('moves').textContent=moves+' moves';$('copy').textContent=l[3];$('haz').textContent=l[1];$('danger').className=l[2];$('warn').textContent=mode==='play'?'⚠ '+l[10]+' in '+surge+' moves':'';$('locks').textContent=locks?'🔒 '+l[7]+': '+(startLocks-locks)+'/'+startLocks:'✅ Rescue path open';$('next').disabled=mode!=='won'||level===L.length-1;$('score').textContent='⭐ '+(stars[level]||0)+' 🪙 '+score;drawProps();drawPins();drawCinematic();drawGoals();drawTools();drawBoard();drawMapNodes()}
function drawProps(){let l=L[level],h='';for(let i=0;i<Math.max(3,startLocks);i++)h+='<span class="prop" style="left:'+(12+i*17%74)+'%;top:'+(22+i*13%48)+'%">'+(i<locks?'🔒':l[11])+'</span>';$('props').innerHTML=h}
function drawPins(){let l=L[level],done=startLocks-locks,h='<span class="badge '+(locks?'':'open')+'">'+(locks?'KING TRAPPED':'ESCAPE OPEN')+'</span>';for(let i=0;i<startLocks;i++)h+='<div class="pin '+(i<done?'done':'')+'"><span>'+(i<done?'✅':'🔒')+' '+(i+1)+'. '+l[7].replace(/s$/,'')+'</span><b>'+E[l[6]]+'</b></div>';h+='<div class="hint">Match '+E[l[6]]+' or use Royal Tools to open the rescue path.</div>';$('pins').innerHTML=h}
function drawCinematic(){let l=L[level],gDone=Object.values(goals).every(v=>v<1),lockDone=locks<1,peril=Math.max(8,Math.min(100,Math.round((1-moves/l[8])*100+level*3)));$('cinema').innerHTML=`<h4>🎬 AD-RESCUE BEATS</h4><div class="act done">1 ✅ King in obvious danger: ${l[1]}</div><div class="act ${gDone?'done':''}">2 ${gDone?'✅':'⬜'} Clear scene goals</div><div class="act ${lockDone?'done':''}">3 ${lockDone?'✅':'⬜'} Open ${l[7]}</div><div class="peril"><b style="width:${peril}%"></b></div>`}

function drawGoals(){let h='';for(let k in startGoals){let d=startGoals[k]-(goals[k]||0),p=d/startGoals[k]*100;h+='<div class="goal"><div class="row"><span>'+E[k]+' '+N[k]+'</span><b>'+d+'/'+startGoals[k]+'</b></div><div class="meter"><div class="fill" style="width:'+p+'%"></div></div></div>'}let p=(startLocks-locks)/startLocks*100;h+='<div class="goal"><div class="row"><span>🔓 '+L[level][7]+'</span><b>'+(startLocks-locks)+'/'+startLocks+'</b></div><div class="meter"><div class="fill" style="width:'+p+'%"></div></div></div>';$('goals').innerHTML=h}
function drawTools(){$('tools').innerHTML=['hammer:🔨 Royal Hammer:break/collect','splash:💧 Water Splash:clear rescue tiles','key:🔑 Key Ring:open 1 lock'].map(x=>{let [k,t,s]=x.split(':'),off=!tools[k]||(k==='key'&&!locks);return '<button onclick="useTool(\''+k+'\')" '+(off?'disabled':'')+'>'+t+'<small>'+s+'</small></button>'}).join('')}
function drawBoard(){$('board').innerHTML=B.map((t,i)=>{let cls='tile '+(t.h?'hole ':'')+(t.block?'block ':'')+(sel===i?'sel ':'')+(t.power?'power ':'')+(!t.h&&!t.block&&(goals[t.type]>0||t.type==L[level][6])?'goalTile ':'');let face=t.h?'×':t.block?({metal:'⚙️',vine:'🌿',ice:'🧊',crate:'📦'}[t.block]||'📦'):(t.power||'')+E[t.type];return '<div data-i="'+i+'" class="'+cls+'" style="--a:'+C[t.type][0]+';--b:'+C[t.type][1]+'">'+face+'</div>'}).join('');document.querySelectorAll('.tile').forEach(x=>x.onclick=()=>tap(+x.dataset.i))}
function tap(i){let t=B[i];if(mode!=='play'||!t||t.h||t.block)return;if(sel==null){sel=i;drawBoard();return}let a=B[sel],d=Math.abs(a.c-t.c)+Math.abs(a.r-t.r);if(d!==1){sel=i;drawBoard();return}swap(a,t);moves--;surge--;if(a.power||t.power){activate(a.power?a:t);sel=null;afterMove();return}let m=matches();if(!m.size){swap(a,t);moves++;surge++;sel=null;say('No match — swap adjacent glowing rescue tiles.');draw();return}resolve(m);sel=null;afterMove()}
function afterMove(){if(done())win();else{if(surge<=0)hazard();if(moves<=0)lose()}draw()}
function swap(a,b){[a.type,b.type]=[b.type,a.type];[a.power,b.power]=[b.power,a.power]}
function matches(){let m=new Set;for(let r=0;r<7;r++)run(B.filter(t=>t.r===r).sort((a,b)=>a.c-b.c),m);for(let c=0;c<7;c++)run(B.filter(t=>t.c===c).sort((a,b)=>a.r-b.r),m);return m}function run(a,m){let q=[];for(let t of a){if(t.h||t.block||q.length&&q[0].type!==t.type){if(q.length>2)q.forEach(x=>m.add(x));q=t.h||t.block?[]:[t]}else q.push(t)}if(q.length>2)q.forEach(x=>m.add(x))}
function count(t,c){if(t.h)return;if(t.block){t.block='';score+=65;return}c[t.type]++;t.type=R(6);t.power=''}
function apply(c,mult=140){for(let k in goals){let v=Math.min(goals[k],c[k]);goals[k]-=v;score+=v*mult}let hit=c[L[level][6]];if(hit&&locks){locks=Math.max(0,locks-hit);score+=hit*(mult+60)}}
function resolve(m){let c=[0,0,0,0,0,0],big=m.size;combo++;m.forEach(t=>{c[t.type]++;t.type=R(6);t.power=big>4?'🌈':big>3?'🚀':'';near(t).forEach(n=>{if(n.block&&R(2))n.block=''})});apply(c);score+=big*25+combo*15;toast(big>4?'RAINBOW MADE!':big>3?'ROCKET MADE!':'+'+big);say(big+' tiles cleared '+(combo>1?'Combo x'+combo:''))}
function activate(t){let c=[0,0,0,0,0,0],p=t.power;t.power='';if(p==='🌈'){let typ=t.type;B.forEach(x=>{if(!x.h&&!x.block&&x.type===typ)count(x,c)});toast('RAINBOW RESCUE!');say('🌈 Rainbow cleared every '+E[typ]+' tile.')}else{let row=R(2);B.forEach(x=>{if((row&&x.r===t.r)||(!row&&x.c===t.c))count(x,c)});toast(row?'ROW ROCKET!':'COLUMN ROCKET!');say('🚀 Rocket blasted a '+(row?'row':'column')+' through the trap.')}apply(c,155);score+=c.reduce((a,b)=>a+b,0)*35}
function useTool(k){if(!tools[k]||mode!=='play')return;tools[k]=0;if(k==='key'&&locks){locks--;score+=180;say('🔑 Key Ring opened one lock.')}else if(k==='hammer'){let t=B.find(x=>x.block&&!x.h)||B.find(x=>!x.h&&goals[x.type]>0);if(t){if(t.block)t.block='';else goals[t.type]=Math.max(0,goals[t.type]-1);score+=140;say('🔨 Royal Hammer made a rescue move.')}}else{let c=0;B.slice().sort(()=>Math.random()-.5).forEach(t=>{if(c<5&&!t.h&&!t.block&&(goals[t.type]>0||t.type===L[level][6])){if(goals[t.type]>0)goals[t.type]--;if(t.type===L[level][6]&&locks)locks--;t.type=R(6);c++;score+=95}});say('💧 Water Splash cleared '+c+' rescue tiles.')}afterMove()}
function hazard(){surge=4;combo=0;$('scene').classList.add('shake');setTimeout(()=>$('scene').classList.remove('shake'),600);if(locks&&level%3!==0)locks=Math.min(startLocks,locks+1);else B.filter(t=>!t.h&&!t.block).slice(0,2+Math.floor(level/4)).forEach(t=>t.block=L[level][9]);moves=Math.max(0,moves-1);say('⚠ Hazard surge: '+L[level][10]+'!')}
function near(t){return B.filter(n=>Math.abs(n.c-t.c)+Math.abs(n.r-t.r)===1)}function done(){return locks<1&&Object.values(goals).every(v=>v<1)}
function win(){mode='won';let s=moves>8?3:moves>3?2:1;stars[level]=Math.max(stars[level]||0,s);unlocked=Math.max(unlocked,Math.min(L.length,level+2));localStorage.krUnlock=unlocked;localStorage.krStars=JSON.stringify(stars);toast('KING SAVED!');say('⭐ King saved! Next rescue unlocked.')}function lose(){mode='lost';toast('TRY AGAIN');say('Danger reached the king — use rockets, tools, and goal tiles faster.')}function say(s){$('msg').textContent=s}function toast(s){let d=document.createElement('div');d.className='toast';d.textContent=s;document.body.appendChild(d);setTimeout(()=>d.remove(),820)}
function showMap(){$('map').classList.toggle('show');drawMapNodes()}function drawMapNodes(){$('map').innerHTML=L.map((l,i)=>'<div class="node '+(i>=unlocked?'locknode':'')+'" '+(i<unlocked?'onclick="start('+i+')"':'')+'>'+(i+1)+'. '+l[1]+' '+l[0]+'<br>'+(i<unlocked?(stars[i]?'⭐'.repeat(stars[i]):'Play'):'Locked')+'</div>').join('')}
window.start=start;window.showMap=showMap;window.useTool=useTool;window.__gameTest={start,showMap,useTool,forceWin:()=>{for(let k in goals)goals[k]=0;locks=0;win();draw()},forceSurge:()=>{hazard();draw()},getState:()=>({mode,level,levels:L.length,name:L[level][0],moves,goals,locks,unlocked,nextDisabled:$('next').disabled,hasMap:true,hasHazardSurge:true,hasPinPanel:true,hasRoyalTools:true,hasFunctionalPowerUps:true,hasCinematicMission:true,tools,surge,score,grid:B.length})};start(0)
})();</script></body></html>
