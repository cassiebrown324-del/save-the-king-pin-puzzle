<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Save the King вЂ” Royal Rescue Match</title><style>html,body{margin:0;height:100%;background:radial-gradient(circle at top,#8050c8,#170920);font-family:system-ui,Segoe UI,sans-serif;color:#fff4cf;overflow:hidden}#app{max-width:520px;height:100vh;margin:auto;display:flex;flex-direction:column;padding:10px;gap:8px}.top,.bar,.map{background:#12081dcc;border:1px solid #ffffff28;border-radius:18px;padding:9px;box-shadow:0 12px 30px #0008}.top{display:flex;justify-content:space-between;align-items:center;font-weight:900}.scene{position:relative;min-height:245px;border-radius:24px;overflow:hidden;background:#281236;border:3px solid #ffffff24;box-shadow:inset 0 0 50px #000}.danger{position:absolute;inset:auto 0 0;height:34%;background:linear-gradient(#ffef62,#ff6a1f,#92142d);animation:wav 2s infinite alternate}.water{background:linear-gradient(#70e6ff,#178bd7)}.fire{background:linear-gradient(#fff26c,#ff3e24)}.ice{background:linear-gradient(#d9fbff,#76b9ff)}.venom{background:linear-gradient(#8cff75,#157c38)}.dark{background:linear-gradient(#aaa,#333)}@keyframes wav{to{height:48%}}.king{position:absolute;left:50%;top:42%;translate:-50% -50%;font-size:78px;filter:drop-shadow(0 10px 18px #000);animation:bob 1.1s infinite alternate}.haz{position:absolute;font-size:64px;right:35px;top:44px;animation:bob .8s infinite alternate-reverse}.locks{position:absolute;left:0;right:0;bottom:12px;text-align:center;font-weight:1000;text-shadow:0 3px 5px #000}.copy{position:absolute;left:12px;right:12px;top:10px;text-align:center;font-weight:1000;background:#0008;border-radius:14px;padding:7px}@keyframes bob{to{transform:translateY(10px)}}.objectives{display:flex;gap:7px}.obj{flex:1;background:#16091fcc;border:1px solid #ffffff22;border-radius:15px;padding:7px;font-weight:900}.meter{height:8px;background:#06030a;border-radius:9px;margin-top:5px;overflow:hidden}.fill{height:100%;background:#ffd85c}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:#0d0615;border-radius:22px;padding:9px;touch-action:none}.tile{aspect-ratio:1;border-radius:15px;border:2px solid #fff5;display:grid;place-items:center;font-size:29px;background:linear-gradient(145deg,var(--a),var(--b));box-shadow:inset 0 4px 8px #fff5,0 5px 0 #0006;font-weight:900}.tile.goal{outline:4px solid #fff2a0;animation:pulse .7s infinite alternate}.tile.sel{outline:5px solid #fff}.tile.block{filter:grayscale(.35) brightness(.7)}.tile.hole{background:#05030a;color:#ffffff24;box-shadow:none}.tile.power{box-shadow:0 0 22px #fff,inset 0 4px 8px #fff5}.msg{text-align:center;font-weight:1000;min-height:24px}.bar{display:flex;justify-content:space-between;gap:5px;font-weight:1000}button{border:0;border-radius:14px;background:linear-gradient(#fff2a6,#ffc53a);padding:10px 12px;font-weight:1000;color:#301627;box-shadow:0 5px 0 #8c5b10}.map{display:none;grid-template-columns:1fr 1fr;gap:8px;overflow:auto}.map.show{display:grid}.node{border:2px solid #ffd85c77;border-radius:18px;padding:12px;background:#180a24;text-align:center;font-weight:1000}.node.lock{filter:grayscale(1);opacity:.5}</style></head><body><div id=app><div class=top><span id=title></span><span id=moves></span></div><div class=scene id=scene><div class=copy id=copy></div><div class=danger id=danger></div><div class=haz id=haz></div><div class=king>рџ¤ґ</div><div class=locks id=locks></div></div><div class=objectives id=objs></div><div class=board id=board></div><div class=msg id=msg></div><div class=bar><button onclick=showMap()>рџ—є Map</button><button onclick=start(level)>в†» Restart</button><button id=next onclick=start(Math.min(level+1,L.length-1)) disabled>Next в–¶</button></div><div class=map id=map></div></div><script>(()=>{const E=['рџ’§','рџЄў','рџ”Ґ','рџ”‘','рџ”Ё','рџ›ЎпёЏ'],C=[['#baf8ff','#168ee7'],['#ffe7a0','#a5601d'],['#ffd35f','#ef3428'],['#fff498','#d49a12'],['#e8f3ff','#657b90'],['#d4c2ff','#7044e5']],L=[['Lava Drop','рџЊ‹','lava','Match ropes to hoist the king before lava rises.',1,{1:9},0,18],['Flooded Cellar','рџЊЉ','water','Open drain valves with keys before the cellar floods.',3,{3:9},3,20],['Kitchen Fire','рџ”Ґ','fire','Douse stove fires with water matches.',0,{0:11},5,20],['Frozen Throne','рџ§Љ','ice','Melt ice seals with fire matches.',2,{2:10},4,22],['Dragon Bridge','рџђ‰','fire','Repair bridge planks with hammers while the dragon attacks.',4,{4:11},3,23],['Snake Pit','рџђЌ','venom','Break venom cages with shields through tangled vines.',5,{5:10},4,21],['Saw Trap','вљ™пёЏ','dark','Smash spinning saw controls with hammers.',4,{4:12},4,22],['Tower Crush','рџ“Њ','dark','Unlock ceiling pins with keys, then pull ropes.',3,{3:12,1:7},5,24],['Bee Swarm Garden','рџђќ','venom','Calm bee swarms with water and shield the king.',0,{0:12,5:6},5,23],['Mine Cart Collapse','в›ЏпёЏ','dark','Repair rail switches with hammers and keys before boulders fall.',4,{4:13,3:6},6,25]];let B=[],level=0,moves=0,goals={},startGoals={},locks=0,startLocks=0,sel=null,unlocked=+(localStorage.krUnlock||1),stars=JSON.parse(localStorage.krStars||'[]'),mode='play',score=0;const $=id=>document.getElementById(id),R=n=>Math.floor(Math.random()*n),K=(c,r)=>c+','+r;function holes(i){return new Set([[0,0],[6,0],[0,6],[6,6],[3,3],[1,5],[5,1]].slice(0,i%7+2).map(x=>K(...x)))}function start(i=0){level=i;mode='play';sel=null;score=0;moves=L[i][7];goals={...L[i][5]};startGoals={...goals};locks=L[i][6];startLocks=locks;let H=holes(i);B=[];for(let r=0;r<7;r++)for(let c=0;c<7;c++){let type=R(6),hole=H.has(K(c,r));B.push({c,r,type,hole,block:!hole&&R(9)<(i>4?2:1)})}for(let n=0;n<4;n++){let t=B.find(x=>!x.hole&&!x.block&&x.type!==L[i][4]);if(t)t.type=L[i][4]}draw();say(L[i][0]+' вЂ” '+L[i][3])}function draw(){let l=L[level];$('title').textContent=`рџ‘‘ ${level+1}/10 ${l[0]}`;$('moves').textContent=`${moves} moves`;$('copy').textContent=l[3];$('haz').textContent=l[1];$('danger').className='danger '+l[2];$('locks').textContent=locks?`рџ”’ ${lockName()} ${startLocks-locks}/${startLocks}`:'вњ… Rescue path open';$('next').disabled=mode!=='won'||level===L.length-1;drawObj();drawBoard();drawMapNodes()}function lockName(){return ['chains','valves','fires','ice seals','planks','cages','saws','pins','swarms','rails'][level]}function drawObj(){let h='';for(let k in startGoals){let done=startGoals[k]-(goals[k]||0),p=done/startGoals[k]*100;h+=`<div class=obj>${E[k]} ${done}/${startGoals[k]}<div class=meter><div class=fill style=width:${p}%></div></div></div>`}if(startLocks)h+=`<div class=obj>${locks?'рџ”’':'вњ…'} ${startLocks-locks}/${startLocks}<div class=meter><div class=fill style=width:${(startLocks-locks)/startLocks*100}%></div></div></div>`;$('objs').innerHTML=h}function drawBoard(){$('board').innerHTML=B.map((t,i)=>`<div data-i=${i} class="tile ${t.hole?'hole':''} ${t.block?'block':''} ${t.type==L[level][4]&&!t.hole?'goal':''} ${sel==i?'sel':''} ${t.power?'power':''}" style="--a:${C[t.type]?.[0]};--b:${C[t.type]?.[1]}">${t.hole?'Г—':t.block?'рџ“¦':(t.power||'')+E[t.type]}</div>`).join('');[...document.querySelectorAll('.tile')].forEach(x=>x.onclick=()=>tap(+x.dataset.i))}function tap(i){if(mode!=='play')return;let t=B[i];if(t.hole||t.block)return;if(sel==null){sel=i;drawBoard();return}let a=B[sel],d=Math.abs(a.c-t.c)+Math.abs(a.r-t.r);if(d!==1){sel=i;drawBoard();return}[a.type,t.type]=[t.type,a.type];moves--;let m=matches();if(!m.size){[a.type,t.type]=[t.type,a.type];say('No match вЂ” swap adjacent goal tiles.');sel=null;draw();return}resolve(m);sel=null;draw()}function matches(){let m=new Set;for(let r=0;r<7;r++)run(B.filter(t=>t.r==r).sort((a,b)=>a.c-b.c),m);for(let c=0;c<7;c++)run(B.filter(t=>t.c==c).sort((a,b)=>a.r-b.r),m);return m}function run(a,m){let q=[];for(let t of a){if(t.hole||t.block){mark(q,m);q=[]}else if(q[0]&&q[0].type!==t.type){mark(q,m);q=[t]}else q.push(t)}mark(q,m)}function mark(q,m){if(q.length>2)q.forEach(t=>m.add(t))}function resolve(m){let counts=[0,0,0,0,0,0],big=m.size;m.forEach(t=>{counts[t.type]++;t.type=R(6);t.power=big>3?(big>4?'рџЊ€':'рџљЂ'):'';near(t).forEach(n=>{if(n.block&&R(2)){n.block=0;score+=50}})});for(let k in goals){let v=Math.min(goals[k],counts[k]);goals[k]-=v;score+=v*120}let s=counts[L[level][4]];if(s&&locks){locks=Math.max(0,locks-s);score+=s*180}if(big>4){let typ=[...m][0].type;B.forEach(t=>{if(!t.hole&&!t.block&&t.type==typ)t.type=R(6)})}say(`${big} tiles cleared! ${s?'Rescue lock hit!':''}`);if(done()){win();return}if(moves<=0)lose()}function near(t){return B.filter(n=>Math.abs(n.c-t.c)+Math.abs(n.r-t.r)==1)}function done(){return locks<1&&Object.values(goals).every(v=>v<1)}function win(){mode='won';stars[level]=3;unlocked=Math.max(unlocked,Math.min(10,level+2));localStorage.krUnlock=unlocked;localStorage.krStars=JSON.stringify(stars);say('в­ђ King saved! Next rescue unlocked.');draw()}function lose(){mode='lost';say('Danger reached the king вЂ” restart and focus glowing GOAL tiles.')}function say(s){$('msg').textContent=s}function showMap(){$('map').classList.toggle('show');drawMapNodes()}function drawMapNodes(){$('map').innerHTML=L.map((l,i)=>`<div class="node ${i>=unlocked?'lock':''}" onclick="${i<unlocked?`start(${i})`:''}">${i+1}. ${l[1]} ${l[0]}<br>${i<unlocked?('в­ђ'.repeat(stars[i]||0)||'Play'):'Locked'}</div>`).join('')}window.__gameTest={start,showMap,forceWin:()=>{for(let k in goals)goals[k]=0;locks=0;win()},getState:()=>({mode,level,levels:L.length,name:L[level][0],moves,goals,locks,unlocked,nextDisabled:$('next').disabled,hasPowerUps:true,hasMap:true,hasObjectiveCards:true,score,grid:B})};start(0)})();</script></body></html>
