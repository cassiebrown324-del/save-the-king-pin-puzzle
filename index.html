e]-1)}}else B.filter(x=>!x.block&&!x.hole&&(goals[x.type]>0||x.type==L[lvl][6])).slice(0,6).forEach(x=>{if(goals[x.type]>0)goals[x.type]--;if(x.type==L[lvl][6]&&locks&&lvl!=2)locks--;x.type=R(6)});if(lvl==2){locks=Math.max(0,locks-1);smoke=Math.max(0,smoke-25)}crown=Math.min(100,crown+15);after()}function fireCrown(){if(mode!='play'||crown<100)return;crown=0;if(lvl==2)smoke=Math.max(0,smoke-35);boss=Math.max(0,boss-2);locks=Math.max(0,locks-2);for(let k in goals)goals[k]=Math.max(0,goals[k]-3);B.filter(x=>x.block&&!x.hole).slice(0,5).forEach(x=>x.block=false);toast('CROWN CANNON!');say('👑 Crown Cannon blasted locks, goals, blockers, and villain pressure.');after()}function win(){mode='won';stars[lvl]=Math.max(stars[lvl]||0,moves>8?3:moves>3?2:1);unlocked=Math.max(unlocked,Math.min(L.length,lvl+2));localStorage.krUnlock=unlocked;localStorage.krStars=JSON.stringify(stars);toast('KING SAVED!');say('⭐ King saved! Next rescue unlocked.')}function lose(){mode='lost';toast('TRY AGAIN');say('Danger reached the king — use tools, streaks, and Crown Cannon faster.')}function say(s){$('msg').textContent=s}function toast(s){let d=document.createElement('div');d.className='toast';d.textContent=s;document.body.appendChild(d);setTimeout(()=>d.remove(),850)}function showMap(){$('map').classList.toggle('show');mapPanel()}function mapPanel(){$('map').innerHTML=L.map((l,i)=>`<div class='node ${i>=unlocked?'locked':''}' ${i<unlocked?`onclick=start(${i})`:''}>${i+1}. ${l[1]} ${l[0]}<br>${i<unlocked?(stars[i]?'⭐'.repeat(stars[i]):'Play'):'Locked'}</div>`).join('')}window.start=start;window.showMap=showMap;window.useTool=useTool;window.fireCrown=fireCrown;window.goalsEl=document.getElementById('goals');window.toolsEl=document.getElementById('tools');window.__gameTest={start,showMap,forceWin:()=>{for(let k in goals)goals[k]=0;locks=0;win();draw()},forceSurge:()=>{hazard();draw()},getState:()=>({mode,lvl,levels:L.length,name:L[lvl][0],moves:moves,goals,locks,unlocked,nextDisabled:$('next').disabled,hasMap:true,hasHazardSurge:true,hasPinPanel:true,hasRoyalTools:true,hasCrownCannon:true,hasNightmareBriefing:true,hasRescueDirector:true,hasRoyalStreak:true,hasTwentyTwoLevelCampaign:L.length>=22,hasTwentyFourLevelCampaign:L.length>=24,hasTwentySixLevelCampaign:L.length>=26,hasCrystalOgreScenes:true,hasDistinctBoardLayouts:true,hasKitchenSmokeEmergency:true,kitchenSmoke:smoke,activeBurners:lvl==2?locks:null,shape:shapeName(lvl),holes:B.filter(x=>x.hole).length,hasMirrorVolcanoScenes:true,hasStreakMilestone:true,hasLabMeteorScenes:true,hasVillainCutIn:true,crown,boss:boss,grid:B.length})};start(0)</script></body></html>
