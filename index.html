xed;left:50%;top:50%;translate:-50% -50%;font-size:28px;font-weight:1000;text-shadow:0 4px 10px #000;animation:t .85s forwards}@keyframes t{to{opacity:0;transform:translateY(-44px) scale(1.2)}}.shake{animation:s .16s 4}@keyframes s{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}</style></head><body><div id=app><div class='top card'><div id=title></div><div id=moves></div></div><div id=scene class=scene><div id=copy class=copy></div><div id=warn class=warn></div><div id=danger class='danger lava'></div><div id=haz class=haz></div><div class=king>🤴</div><div id=props></div><div id=pins class='panel left'></div><div id=beats class='panel right'></div></div><div id=brief class=strip></div><div id=director class=strip></div><div id=streak class=strip></div><div id=boss class=strip></div><div id=goals class=goals></div><div id=tools class=tools></div><div id=board class=board></div><div id=msg class=msg></div><div class='hud card'><button onclick='showMap()'>🗺 Map</button><span id=score></span><button onclick='start(lvl)'>↻</button><button id=next onclick='start(Math.min(lvl+1,L.length-1))'>Next ▶</button></div><div id=map class=map></div></div><script>const E=['💧','🪢','🔥','🔑','🔨','🛡️'],N=['Water','Rope','Fire','Key','Hammer','Shield'],C=['#13a9ef','#b06a22','#ef3c25','#e0a91a','#718095','#744fe2'];const L=[['Lava Drop','🌋','lava','Cut rope chains before lava reaches the throne.',[[1,10]],3,1,'rope chains','Lava throws rubble','🔥'],['Flooded Cellar','🌊','water','Open drain valves with keys while floodwater rises.',[[3,10],[0,5]],3,3,'drain valves','Flood reseals a valve','💦'],['Kitchen Fire','🔥','fire','Douse stove fires with water before smoke fills the kitchen.',[[0,12]],5,0,'stove fires','A stove reignites','🍳'],['Frozen Throne','🧊','ice','Melt ice seals with fire tiles and free the throne.',[[2,12]],4,2,'ice seals','Frost spreads','❄️'],['Dragon Bridge','🐉','fire','Repair bridge planks with hammers while dragon fire closes in.',[[4,12],[5,5]],4,4,'bridg ,[2,3,4,9,11,16,18,30,32,37,39,44,45,46]];let B=[],lvl=0,moves=0,goals=[],startGoals=[],locks=0,startLocks=0,sel=null,mode='play',score=0,surge=4,crown=0,streak=0,unlocked=+(localStorage.krUnlock||1),stars=JSON.parse(localStorage.krStars||'[]'),tools={};const $=id=>document.getElementById(id),R=n=>Math.floor(Math.random()*n),left=()=>goals.reduce((a,g)=>a+g[1],0),done=()=>locks<1&&left()<1,pct=(a,b)=>Math.max(0,Math.min(100,Math.round(a/b*100)));function start(i=0){lvl=i;mode='play';moves=22+Math.min(i,9);goals=L[i][4].map(g=>[g[0],g[1]]);startGoals=L[i][4].map(g=>[g[0],g[1]]);locks=L[i][5];startLocks=locks;sel=null;crown=0;streak=0;surge=4;tools={hammer:1,splash:1,key:1};let H=new Set(SH[i%SH.length]);B=[...Array(49)].map((_,j)=>({type:R(6),hole:H.has(j),block:!H.has(j)&&R(10)<(i>7?3:2)}));[L[i][6],...goals.map(g=>g[0])].forEach(k=>{for(let n=0;n<7;n++){let t=B.find(x=>!x.hole&&!x.block&&x.type!=k);if(t)t.type=k}});draw();say('Save the king: '+L[i][3])}function draw(){let l=L[lvl];$('title').textContent=`👑 ${lvl+1}/${L.length} ${l[0]}`;$('moves').textContent=moves+' moves';$('copy').textContent=l[3];$('haz').textContent=l[1];$('danger').className='danger '+l[2];$('warn').textContent=mode=='play'?`⚠ ${l[8]} in ${surge} moves`:'';$('score').textContent=`⭐ ${stars[lvl]||0} 👑 ${crown}% 🪙 ${score}`;$('next').disabled=mode!='won'||lvl==L.length-1;brief();director();panels();goalsUI();toolsUI();board();mapUI()}function brief(){let l=L[lvl],need=l[4].map(g=>`${E[g[0]]} ${N[g[0]]} x${g[1]}`).join(' + ');$('brief').innerHTML=`<div><b>🎥 NIGHTMARE BRIEFING</b><br>${l[3]}</div><div><b>🎯 Recipe</b><br>${need}; open ${l[7]} with ${E[l[6]]}</div><div><b>⚠ Board</b><br>${l[8]} every 4 moves; ${SH[lvl%SH.length].length} gaps.</div>`}function director(){let best=locks?'match '+E[L[lvl][6]]+' or use 🔑':left()?'match glowing goals':'fire 👑 Cannon';$('director').innerHTML=`<div><b>🎬 RESCUE DIRECTOR</b><br>${left()} goals and ${locks} locks left.</div><div><b>Best action</b><br>${best}; surge in ${surge}.</div><div><b>👑 Cannon</b><br>${crown}% charge.</div>`;$('streak').innerHTML=`<div><b>🔥 ROYAL STREAK</b><br>${streak} clean clears.</div><div><b>Milestone</b><br>Every 3rd clear opens a lock or grabs goals.</div><div><b>Breakers</b><br>No-match swaps and surges reset it.</div>`}function panels(){let l=L[lvl],gp=startGoals.reduce((a,g,i)=>a+g[1]-goals[i][1],0),gt=startGoals.reduce((a,g)=>a+g[1],0),h=`<span class='pill ${locks?'':'done'}'>${locks?'KING TRAPPED':'ESCAPE OPEN'}</span>`;for(let i=0;i<startLocks;i++)h+=`<div class='row ${i<startLocks-locks?'done':''}'><span>${i<startLocks-locks?'✅':'🔒'} ${l[7]}</span><b>${E[l[6]]}</b></div>`;$('pins').innerHTML=h;$('beats').innerHTML=`<b>🎬 RESCUE BEATS</b><div class='row done'>1 King in danger ${l[1]}</div><div class='row ${gp>=gt?'done':''}'>2 Goals ${gp}/${gt}</div><div class='row ${locks<1?'done':''}'>3 Trap ${locks?'locked':'open'}</div><div class=bar><b style='width:${pct(gp+startLocks-locks,gt+startLocks)}%'></b></div>`;$('boss').innerHTML=`<div><b>😈 VILLAIN CUT-IN</b><br>${['Troll','Gremlin','Imp','Witch','Dragon','Snake','Goblin','Ogre','Bee Queen','Mine Brute','Ghost','Kraken','Mummy','Storm Wizard','Warden','Avalanche Beast','Kraken','Golem','Pirate','Alchemist','Meteor Mage','Jester','Foreman','Crystal Warden','Dam Ogre','Sand Serpent','Laser Jester','Usurper'][lvl]} pressure ${Math.min(100,20+lvl*3)}%</div><div><b>Counterplay</b><br>Tools, streaks, and Crown Cannon knock danger back.</div><div><b>Ad moment</b><br>The hazard visibly fights between moves.</div>`;let p='';for(let i=0;i<Math.max(4,startLocks);i++)p+=`<span class=prop style='left:${10+i*15%80}%;top:${25+i*11%52}%'>${i<locks?'🔒':l[9]}</span>`;$('props').innerHTML=p}function goalsUI(){let h='';startGoals.forEach((g,i)=>{let d=g[1]-goals[i][1];h+=`<div class=goal>${E[g[0]]} ${N[g[0]]} <b>${d}/${g[1]}</b><div class=bar><b style='width:${pct(d,g[1])}%'></b></div></div>`});h+=`<div class=goal>🔓 ${L[lvl][7]} <b>${startLocks-locks}/${startLocks}</b><div class=bar><b style='width:${pct(startLocks-locks,startLocks)}%'></b></div></div>`;$('goals').innerHTML=h}function toolsUI(){$('tools').innerHTML=`<button onclick='useTool("hammer")' ${!tools.hammer?'disabled':''}>🔨 Hammer</button><button onclick='useTool("splash")' ${!tools.splash?'disabled':''}>💧 Splash</button><button onclick='useTool("key")' ${!tools.key||!locks?'disabled':''}>🔑 Key</button><button onclick='fireCrown()' ${crown<100?'disabled':''}>👑 ${crown}%</button>`}function board(){$('board').innerHTML=B.map((t,i)=>`<div class='tile ${t.hole?'hole ':''}${sel==i?'sel ':''}${t.block?'block ':''}${!t.hole&&!t.block&&(goals.some(g=>g[0]==t.type&&g[1]>0)||t.type==L[lvl][6])?'need ':''}' style='--bg:${C[t.type]}' onclick='tap(${i})'>${t.hole?'×':t.block?'📦':E[t.type]}</div>`).join('')}function tap(i){if(mode!='play'||B[i].block||B[i].hole)return;if(sel==null){sel=i;board();return}let a=sel,b=i,adj=(Math.abs(a-b)==1&&Math.floor(a/7)==Math.floor(b/7))||Math.abs(a-b)==7;if(!adj){sel=i;board();return}[B[a].type,B[b].type]=[B[b].type,B[a].type];moves--;surge--;let m=matches();if(!m.size){[B[a].type,B[b].type]=[B[b].type,B[a].type];moves++;surge++;streak=0;sel=null;say('No match — streak reset.');draw();return}clear(m);sel=null;after()}function matches(){let s=new Set;for(let r=0;r<7;r++)run([...Array(7)].map((_,c)=>r*7+c),s);for(let c=0;c<7;c++)run([...Array(7)].map((_,r)=>r*7+c),s);return s}function run(ix,s){let q=[];for(let i of ix){let t=B[i];if(t.block||t.hole||(q.length&&B[q[0]].type!=t.type)){if(q.length>2)q.forEach(x=>s.add(x));q=(t.block||t.hole)?[]:[i]}else q.push(i)}if(q.length>2)q.forEach(x=>s.add(x))}function clear(s){let c=[0,0,0,0,0,0];s.forEach(i=>{c[B[i].type]++;B[i].type=R(6);B[i].block=false});apply(c);streak++;score+=s.size*30+streak*35;crown=Math.min(100,crown+streak*4);if(streak%3==0){if(locks)locks--;else goals.forEach(g=>g[1]=Math.max(0,g[1]-2));score+=220;crown=Math.min(100,crown+18);toast('STREAK RESCUE!')}else toast(s.size>4?'RAINBOW!':s.size>3?'ROCKET!':'MATCH!');say(`${s.size} rescue tiles cleared.`)}function apply(c){goals.forEach(g=>{let v=Math.min(g[1],c[g[0]]);g[1]-=v;score+=v*120;crown=Math.min(100,crown+v*8)});let hit=c[L[lvl][6]];if(hit&&locks){locks=Math.max(0,locks-hit);score+=hit*180;crown=Math.min(100,crown+hit*10)}}function after(){if(done())win();else{if(surge<=0)hazard();if(moves<=0)lose()}draw()}function hazard(){surge=4;streak=0;$('scene').classList.add('shake');setTimeout(()=>$('scene').classList.remove('shake'),600);if(locks&&lvl%3)locks=Math.min(startLocks,locks+1);else B.filter(x=>!x.block&&!x.hole).slice(0,2+Math.floor(lvl/5)).forEach(x=>x.block=true);moves=Math.max(0,moves-1);say('⚠ Hazard surge: '+L[lvl][8]+'!')}function useTool(k){if(mode!='play'||!tools[k])return;tools[k]=0;if(k=='key'&&locks)locks--;else if(k=='hammer'){let t=B.find(x=>x.block&&!x.hole);if(t)t.block=false;else goals[0][1]=Math.max(0,goals[0][1]-2)}else goals.forEach(g=>g[1]=Math.max(0,g[1]-3));crown=Math.min(100,crown+15);after()}function fireCrown(){if(mode!='play'||crown<100)return;crown=0;locks=Math.max(0,locks-2);goals.forEach(g=>g[1]=Math.max(0,g[1]-3));B.filter(x=>x.block).slice(0,5).forEach(x=>x.block=false);toast('CROWN CANNON!');say('👑 Crown Cannon blasted locks, goals, and blockers.');after()}function win(){mode='won';stars[lvl]=Math.max(stars[lvl]||0,moves>8?3:moves>3?2:1);unlocked=Math.max(unlocked,Math.min(L.length,lvl+2));localStorage.krUnlock=unlocked;localStorage.krStars=JSON.stringify(stars);toast('KING SAVED!');say('⭐ King saved! Next rescue unlocked.')}function lose(){mode='lost';toast('TRY AGAIN');say('Danger reached the king — use tools, streaks, and Crown Cannon faster.')}function say(s){$('msg').textContent=s}function toast(s){let d=document.createElement('div');d.className='toast';d.textContent=s;document.body.appendChild(d);setTimeout(()=>d.remove(),850)}function showMap(){$('map').classList.toggle('show');mapUI()}function mapUI(){$('map').innerHTML=L.map((l,i)=>`<div cl
