<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Save the King — Match Rescue</title>
<style>
  *{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#6951b8 0,#241442 48%,#10091d 100%);font-family:Inter,ui-rounded,"Trebuchet MS",system-ui,sans-serif;color:#fff7d6}
  #wrap{height:100%;display:grid;place-items:center;padding:10px}
  #phone{width:min(96vw,520px);height:min(96vh,920px);aspect-ratio:9/16;position:relative;border-radius:34px;padding:14px;background:linear-gradient(145deg,#8163d7,#3a2261 55%,#160c2b);box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 0 0 2px rgba(255,255,255,.14)}
  canvas{width:100%;height:100%;display:block;border-radius:25px;background:#1a1030;box-shadow:inset 0 0 0 3px rgba(255,255,255,.12)}
  #ui{position:absolute;inset:14px;pointer-events:none}
  .topbar{position:absolute;left:12px;right:12px;top:12px;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .pill{pointer-events:auto;background:rgba(16,9,31,.72);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 11px;font-weight:900;font-size:13px;box-shadow:0 8px 18px rgba(0,0,0,.22);backdrop-filter:blur(8px);text-shadow:0 2px 2px rgba(0,0,0,.35)}
  .bottombar{position:absolute;left:12px;right:12px;bottom:12px;display:flex;justify-content:space-between;gap:8px}
  button{pointer-events:auto;border:0;border-radius:17px;padding:11px 13px;font-weight:950;font-size:14px;color:#2b1830;background:linear-gradient(#ffe99d,#ffc34d);box-shadow:0 7px 0 #9b6918,0 13px 20px rgba(0,0,0,.28);cursor:pointer;transition:.08s}
  button:active{transform:translateY(5px);box-shadow:0 2px 0 #9b6918,0 7px 14px rgba(0,0,0,.28)}
  button.secondary{color:#fff1cf;background:linear-gradient(#765d9b,#452767);box-shadow:0 7px 0 #241536,0 13px 20px rgba(0,0,0,.28)}
  button:disabled{filter:grayscale(.8) brightness(.65);cursor:not-allowed}
  #toast{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) scale(.94);width:84%;padding:22px 18px;border-radius:26px;background:rgba(17,9,31,.88);border:1px solid rgba(255,255,255,.18);box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center;opacity:0;pointer-events:none;transition:.22s;backdrop-filter:blur(10px)}
  #toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #toast h1{margin:0 0 8px;color:#ffd666;font-size:30px;line-height:1.05}
  #toast p{margin:0;color:#fff0c6;font-weight:800;font-size:15px;line-height:1.28}
  #toast small{display:block;margin-top:9px;color:#cfc0ec;font-weight:800}
</style>
</head>
<body>
<div id="wrap"><div id="phone">
  <canvas id="game" width="900" height="1600"></canvas>
  <div id="ui">
    <div class="topbar"><div class="pill" id="levelPill">Level 1</div><div class="pill" id="goalPill">Match water</div><div class="pill" id="movePill">Moves 20</div></div>
    <div class="bottombar"><button class="secondary" id="resetBtn">↻ Restart</button><button class="secondary" id="shuffleBtn">Shuffle</button><button id="nextBtn" disabled>Next ▶</button></div>
    <div id="toast"><h1 id="toastTitle"></h1><p id="toastText"></p><small>Swap tiles to match 3+</small></div>
  </div>
</div></div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=900,H=1600;
const levelPill=document.getElementById('levelPill'),goalPill=document.getElementById('goalPill'),movePill=document.getElementById('movePill');
const resetBtn=document.getElementById('resetBtn'),shuffleBtn=document.getElementById('shuffleBtn'),nextBtn=document.getElementById('nextBtn');
const toast=document.getElementById('toast'),toastTitle=document.getElementById('toastTitle'),toastText=document.getElementById('toastText');

const TILE={water:{emoji:'💧',c:'#45c8ff',name:'water'},fire:{emoji:'🔥',c:'#ff6b3b',name:'fire'},key:{emoji:'🔑',c:'#ffd45e',name:'keys'},hammer:{emoji:'🔨',c:'#b88bff',name:'hammers'},coin:{emoji:'🪙',c:'#ffe06a',name:'coins'},leaf:{emoji:'🍃',c:'#60e584',name:'leaves'}};
const TYPES=Object.keys(TILE);
const levels=[
 {title:'Lava Bath',objective:'Match 💧 water to flood the lava',target:'water',need:14,moves:22,scene:'lava',danger:'lava',intro:'The king is trapped over lava. Match blue water drops to pour water into the chamber.',win:'The water covered the lava. The king is safe!'},
 {title:'Kitchen Fire',objective:'Match 💧 water to put out the fire',target:'water',need:18,moves:24,scene:'fire',danger:'fire',intro:'Fire is surrounding the king. Fill the bucket by matching water.',win:'Splash! The kitchen fire is out.'},
 {title:'Frozen King',objective:'Match 🔥 fire to melt the ice',target:'fire',need:16,moves:23,scene:'ice',danger:'ice',intro:'The king is frozen solid. Match fire tiles to warm the room.',win:'The ice melted and the king can move again.'},
 {title:'Locked Flood',objective:'Match 🔑 keys to open the drain',target:'key',need:15,moves:22,scene:'flood',danger:'flood',intro:'Water is rising around the king. Match keys to unlock the drain gate.',win:'The gate opened and the flood drained away.'},
 {title:'Dragon Door',objective:'Match 🔨 hammers to build an escape bridge',target:'hammer',need:18,moves:25,scene:'dragon',danger:'dragon',intro:'A dragon blocks the exit. Match hammers to build a bridge and escape.',win:'Bridge built. The king escaped the dragon!'}
];
let L=0,board=[],selected=null,anim=[],particles=[],state='playing',progress=0,moves=0,message='',comboText=[];
const N=8,cell=88,gap=8,boardX=(W-(N*cell+(N-1)*gap))/2,boardY=910;

function showToast(t,txt,ms=1600){toastTitle.textContent=t;toastText.textContent=txt;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),ms)}
function randType(){return TYPES[(Math.random()*TYPES.length)|0]}
function level(){return levels[L]}
function startLevel(i=L){L=i;state='playing';progress=0;moves=level().moves;selected=null;anim=[];particles=[];comboText=[];message='';nextBtn.disabled=true;buildBoard();updateHud();showToast(level().title,level().intro,1900)}
function buildBoard(){
 board=Array.from({length:N},()=>Array(N).fill(null));
 for(let r=0;r<N;r++)for(let c=0;c<N;c++){let t; do{t=randType()}while((c>=2&&board[r][c-1]===t&&board[r][c-2]===t)||(r>=2&&board[r-1][c]===t&&board[r-2][c]===t)); board[r][c]=t;}
 if(!hasMove()) sprinkleTarget();
}
function sprinkleTarget(){for(let i=0;i<7;i++)board[(Math.random()*N)|0][(Math.random()*N)|0]=level().target}
function updateHud(){levelPill.textContent=`👑 ${L+1}/${levels.length} ${level().title}`;goalPill.textContent=`${TILE[level().target].emoji} ${progress}/${level().need}`;movePill.textContent=`Moves ${moves}`}

function matches(){
 const groups=[];
 for(let r=0;r<N;r++){let c=0;while(c<N){let t=board[r][c],s=c;while(c<N&&board[r][c]===t)c++;if(t&&c-s>=3)groups.push([...Array(c-s)].map((_,i)=>[r,s+i]));}}
 for(let c=0;c<N;c++){let r=0;while(r<N){let t=board[r][c],s=r;while(r<N&&board[r][c]===t)r++;if(t&&r-s>=3)groups.push([...Array(r-s)].map((_,i)=>[s+i,c]));}}
 return groups;
}
function hasMove(){
 for(let r=0;r<N;r++)for(let c=0;c<N;c++)for(const [dr,dc] of [[1,0],[0,1]]){let r2=r+dr,c2=c+dc;if(r2<N&&c2<N){swapCells(r,c,r2,c2);let ok=matches().length>0;swapCells(r,c,r2,c2);if(ok)return true;}}
 return false;
}
function swapCells(r,c,r2,c2){const t=board[r][c];board[r][c]=board[r2][c2];board[r2][c2]=t}
function doSwap(a,b){
 if(state!=='playing')return;
 const d=Math.abs(a.r-b.r)+Math.abs(a.c-b.c); if(d!==1){selected=b;return;}
 swapCells(a.r,a.c,b.r,b.c); const m=matches();
 if(!m.length){swapCells(a.r,a.c,b.r,b.c); selected=b; pulseText('No match',W/2,boardY-28,'#fff0c6'); return;}
 moves--; selected=null; resolveMatches(m);
}
function resolveMatches(initial){
 let chain=0;
 const step=(m)=>{
  if(!m.length){ if(!hasMove())shuffleBoard(false); checkEnd(); updateHud(); return; }
  chain++;
  const cells=new Map(); m.flat().forEach(([r,c])=>cells.set(r+','+c,[r,c]));
  let gained=0;
  for(const [r,c] of cells.values()){
    const t=board[r][c]; if(t===level().target)gained++;
    burst(tileCX(c),tileCY(r),TILE[t].c,TILE[t].emoji); board[r][c]=null;
  }
  if(gained){progress=Math.min(level().need,progress+gained); pulseText(`+${gained} ${TILE[level().target].emoji}`,W/2,boardY-45,TILE[level().target].c); pourEffect(gained);}
  dropAndFill(); updateHud();
  setTimeout(()=>step(matches()),210);
 };
 step(initial);
}
function dropAndFill(){
 for(let c=0;c<N;c++){
  let write=N-1;
  for(let r=N-1;r>=0;r--)if(board[r][c]){board[write][c]=board[r][c]; if(write!==r)board[r][c]=null; write--;}
  for(let r=write;r>=0;r--)board[r][c]=randType();
 }
}
function checkEnd(){
 if(progress>=level().need){state='won';nextBtn.disabled=false;message='RESCUED!';showToast('King Saved!',level().win,2500); for(let i=0;i<80;i++)particles.push({x:W/2,y:520,vx:Math.random()*10-5,vy:Math.random()*-9-2,life:90,c:['#ffd666','#52d3ff','#ff79cf','#72ec85'][i%4],r:Math.random()*8+4});return;}
 if(moves<=0){state='lost';message='OUT OF MOVES';showToast('Try again',`You needed ${level().need-progress} more ${TILE[level().target].name}. Restart and focus on ${TILE[level().target].emoji}.`,2500)}
}
function shuffleBoard(show=true){for(let r=0;r<N;r++)for(let c=0;c<N;c++)board[r][c]=randType(); if(show)pulseText('Shuffled!',W/2,boardY-28,'#fff0c6')}
function tileAt(x,y){const bx=x-boardX,by=y-boardY; if(bx<0||by<0)return null; const c=Math.floor(bx/(cell+gap)),r=Math.floor(by/(cell+gap)); if(r<0||c<0||r>=N||c>=N)return null; const lx=bx-c*(cell+gap),ly=by-r*(cell+gap); if(lx>cell||ly>cell)return null; return {r,c}}
function tileCX(c){return boardX+c*(cell+gap)+cell/2} function tileCY(r){return boardY+r*(cell+gap)+cell/2}
function pointer(evt){const rect=canvas.getBoundingClientRect(),t=evt.touches?evt.touches[0]:evt;return{x:(t.clientX-rect.left)*W/rect.width,y:(t.clientY-rect.top)*H/rect.height}}
function tap(evt){evt.preventDefault(); if(state==='lost'){startLevel(L);return} const p=pointer(evt),tc=tileAt(p.x,p.y); if(!tc)return; if(!selected){selected=tc;return} doSwap(selected,tc)}
canvas.addEventListener('mousedown',tap); canvas.addEventListener('touchstart',tap,{passive:false});
resetBtn.onclick=()=>startLevel(L); shuffleBtn.onclick=()=>{if(state==='playing'){moves=Math.max(0,moves-1);shuffleBoard();updateHud();checkEnd()}}; nextBtn.onclick=()=>{if(state==='won')startLevel((L+1)%levels.length)};

function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function draw(){ctx.clearRect(0,0,W,H);drawBackground();drawScene();drawBoard();drawFX();requestAnimationFrame(draw)}
function drawBackground(){
 let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#5b48ad');g.addColorStop(.38,'#2a1a55');g.addColorStop(1,'#110a22');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 ctx.fillStyle='rgba(255,255,255,.04)';for(let i=0;i<40;i++){ctx.beginPath();ctx.arc((i*97)%W,80+((i*173)%1360),2+(i%5),0,7);ctx.fill()}
}
function drawScene(){
 const lv=level();
 // Stage frame
 ctx.save();ctx.translate(70,82);ctx.fillStyle='#201236';round(0,0,760,760,42);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=5;ctx.stroke();
 // stone chamber
 ctx.fillStyle='#5c4a69';round(42,84,676,610,30);ctx.fill();ctx.fillStyle='#2a2037';round(70,116,620,548,24);ctx.fill();
 const fill=progress/lv.need;
 if(lv.scene==='lava')drawLavaScene(fill); if(lv.scene==='fire')drawFireScene(fill); if(lv.scene==='ice')drawIceScene(fill); if(lv.scene==='flood')drawFloodScene(fill); if(lv.scene==='dragon')drawDragonScene(fill);
 drawKing(380,455,fill);
 // objective meter
 ctx.fillStyle='rgba(0,0,0,.45)';round(70,704,620,36,18);ctx.fill();ctx.fillStyle=TILE[lv.target].c;round(74,708,612*fill,28,14);ctx.fill();ctx.fillStyle='#fff6d2';ctx.font='900 25px system-ui';ctx.textAlign='center';ctx.fillText(lv.objective,380,62);
 if(message){ctx.font='950 58px system-ui';ctx.lineWidth=8;ctx.strokeStyle='rgba(0,0,0,.55)';ctx.fillStyle=state==='won'?'#ffe166':'#ff6b58';ctx.strokeText(message,380,365);ctx.fillText(message,380,365)}
 ctx.restore();
}
function drawLavaScene(fill){
 const waterH=240*fill,lavaH=260*(1-fill);
 ctx.fillStyle='#31142b';round(115,200,530,360,24);ctx.fill();
 let lg=ctx.createLinearGradient(0,560-lavaH,0,560);lg.addColorStop(0,'#ff9d3a');lg.addColorStop(.55,'#ff4932');lg.addColorStop(1,'#8f1125');ctx.fillStyle=lg;round(115,560-lavaH,530,lavaH,18);ctx.fill();
 ctx.fillStyle='rgba(255,226,94,.9)';for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(145+i*65+Math.sin(Date.now()/300+i)*10,535-lavaH*.4,8,0,7);ctx.fill()}
 let wg=ctx.createLinearGradient(0,560-waterH,0,560);wg.addColorStop(0,'rgba(154,239,255,.92)');wg.addColorStop(1,'rgba(26,122,230,.92)');ctx.fillStyle=wg;round(115,560-waterH,530,waterH,18);ctx.fill();
 ctx.fillStyle='#6a4c3c';round(260,455,240,52,18);ctx.fill();
 ctx.strokeStyle='#6be7ff';ctx.lineWidth=16;ctx.beginPath();ctx.moveTo(118,185);ctx.lineTo(245,185);ctx.lineTo(245,250);ctx.stroke(); if(fill>0){ctx.strokeStyle='#68d8ff';ctx.lineWidth=22;ctx.beginPath();ctx.moveTo(245,250);ctx.lineTo(245,360);ctx.stroke();}
}
function drawFireScene(fill){
 ctx.fillStyle='#533025';round(100,170,560,410,26);ctx.fill();ctx.fillStyle='#74472d';round(140,460,480,70,20);ctx.fill();
 const flames=Math.ceil(10*(1-fill)); for(let i=0;i<flames;i++)drawFlame(130+i*55,455+Math.sin(Date.now()/150+i)*8,52);
 if(fill>0){ctx.fillStyle='rgba(77,204,255,.35)';round(110,210,540,300*fill,22);ctx.fill();ctx.font='80px system-ui';ctx.fillText('💦',540,250+fill*220)}
 ctx.fillStyle='#b8763a';round(215,508,330,45,14);ctx.fill();
}
function drawIceScene(fill){
 ctx.fillStyle='#16305a';round(100,170,560,410,26);ctx.fill();
 ctx.fillStyle=`rgba(160,237,255,${.78*(1-fill)})`;round(190,285,380,260,28);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=5;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(210+i*70,300);ctx.lineTo(260+i*55,530);ctx.stroke()}
 if(fill>0){for(let i=0;i<6;i++)drawFlame(150+i*86,550,44*fill)}
 ctx.fillStyle='#76513a';round(215,508,330,45,14);ctx.fill();
}
function drawFloodScene(fill){
 const water=290*(1-fill);ctx.fillStyle='#21324d';round(100,170,560,410,26);ctx.fill();ctx.fillStyle='rgba(61,190,255,.74)';round(100,580-water,560,water,26);ctx.fill();
 ctx.fillStyle='#5a3328';round(255,465,250,60,16);ctx.fill();ctx.fillStyle='#27202d';round(560,360,55,190,14);ctx.fill();ctx.fillStyle=fill>.8?'#59e584':'#d03b46';ctx.beginPath();ctx.arc(588,455,20,0,7);ctx.fill();
}
function drawDragonScene(fill){
 ctx.fillStyle='#2d2236';round(100,170,560,410,26);ctx.fill();ctx.fillStyle='#6c2a27';round(480,310,150,130,38);ctx.fill();ctx.font='86px system-ui';ctx.fillText('🐉',545,382);drawFlame(465,445,64*(1-fill));
 ctx.fillStyle='#5b3b2d';round(145,515,210+290*fill,42,16);ctx.fill();ctx.strokeStyle='#d8b077';ctx.lineWidth=6;for(let i=0;i<7*fill;i++){ctx.beginPath();ctx.moveTo(160+i*50,512);ctx.lineTo(160+i*50,562);ctx.stroke()}
}
function drawFlame(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s/60,s/60);ctx.fillStyle='#ff4a32';ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-38,-35,-12,-70,0,-105);ctx.bezierCurveTo(18,-65,48,-38,0,0);ctx.fill();ctx.fillStyle='#ffd15a';ctx.beginPath();ctx.moveTo(0,-8);ctx.bezierCurveTo(-19,-32,-4,-50,8,-75);ctx.bezierCurveTo(20,-46,30,-25,0,-8);ctx.fill();ctx.restore()}
function drawKing(x,y,fill){
 ctx.save();ctx.translate(x,y+Math.sin(Date.now()/250)*4);ctx.shadowBlur=20;ctx.shadowColor='#ffd45e';
 ctx.fillStyle='#6841a2';round(-56,36,112,118,24);ctx.fill();ctx.fillStyle='#ffd0a1';ctx.beginPath();ctx.arc(0,0,52,0,7);ctx.fill();ctx.fillStyle='#fff2d1';ctx.beginPath();ctx.ellipse(0,30,41,27,0,0,7);ctx.fill();
 ctx.fillStyle='#ffd45e';ctx.strokeStyle='#8a5a15';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-45,-36);ctx.lineTo(-29,-82);ctx.lineTo(-8,-44);ctx.lineTo(12,-84);ctx.lineTo(31,-44);ctx.lineTo(47,-82);ctx.lineTo(42,-36);ctx.closePath();ctx.fill();ctx.stroke();
 ctx.fillStyle='#26142d';ctx.beginPath();ctx.arc(-18,-8,5,0,7);ctx.arc(18,-8,5,0,7);ctx.fill();ctx.strokeStyle='#9b5a55';ctx.lineWidth=4;ctx.beginPath(); if(state==='won'||fill>.98)ctx.arc(0,12,18,0,Math.PI);else ctx.arc(0,24,14,Math.PI,0);ctx.stroke();
 ctx.restore();
}
function drawBoard(){
 ctx.save();ctx.fillStyle='rgba(10,6,22,.64)';round(boardX-18,boardY-18,N*cell+(N-1)*gap+36,N*cell+(N-1)*gap+36,30);ctx.fill();
 for(let r=0;r<N;r++)for(let c=0;c<N;c++){const x=boardX+c*(cell+gap),y=boardY+r*(cell+gap),t=board[r][c];ctx.fillStyle='#3a2964';round(x,y,cell,cell,18);ctx.fill();ctx.fillStyle=t?TILE[t].c:'#201436';ctx.globalAlpha=.32;round(x+7,y+7,cell-14,cell-14,15);ctx.fill();ctx.globalAlpha=1;if(selected&&selected.r===r&&selected.c===c){ctx.strokeStyle='#ffe166';ctx.lineWidth=7;round(x-3,y-3,cell+6,cell+6,20);ctx.stroke()} if(t){ctx.font='46px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(TILE[t].emoji,x+cell/2,y+cell/2+2)}}
 ctx.restore();
}
function burst(x,y,c,e){for(let i=0;i<8;i++)particles.push({x,y,vx:Math.random()*8-4,vy:Math.random()*-7-1,life:35,c,r:Math.random()*6+3,e:i===0?e:null})}
function pourEffect(n){for(let i=0;i<n*2;i++)particles.push({x:235+Math.random()*40,y:280,vx:Math.random()*2-1,vy:Math.random()*8+4,life:45,c:TILE[level().target].c,r:Math.random()*5+4})}
function pulseText(text,x,y,c){comboText.push({text,x,y,c,life:55})}
function drawFX(){
 for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.life--;ctx.globalAlpha=Math.max(0,p.life/50);if(p.e){ctx.font='30px system-ui';ctx.fillText(p.e,p.x,p.y)}else{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill()}ctx.globalAlpha=1}
 particles=particles.filter(p=>p.life>0);
 for(const t of comboText){t.y-=1.4;t.life--;ctx.globalAlpha=Math.max(0,t.life/55);ctx.font='950 34px system-ui';ctx.textAlign='center';ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=6;ctx.fillStyle=t.c;ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y);ctx.globalAlpha=1}
 comboText=comboText.filter(t=>t.life>0)
}
window.__gameTest={complete:()=>{progress=level().need;checkEnd();updateHud()},level:()=>({L,state,progress,need:level().need,moves}),startLevel};
startLevel(0);draw();
})();
</script>
</body>
</html>
