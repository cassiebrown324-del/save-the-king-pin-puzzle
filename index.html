<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Save the King — Royal Rescue Match</title>
<style>
:root{--gold:#ffd966;--ink:#14051d;--panel:#1a0b28d9;--line:#ffffff26;--danger:#ff445d}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% -10%,#9159ff 0,#32114a 42%,#12051c 100%);font-family:Inter,ui-rounded,system-ui,Segoe UI,sans-serif;color:#fff3cb}button{border:0;border-radius:14px;background:linear-gradient(#fff6b7,#ffbf30);color:#351421;font-weight:1000;padding:10px 12px;box-shadow:0 5px 0 #8b5608,0 10px 18px #0007}button:disabled{filter:grayscale(1);opacity:.45}#app{width:min(540px,100vw);height:100dvh;margin:auto;display:flex;flex-direction:column;gap:7px;padding:8px}.top,.hud,.objectives,.map{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:0 14px 30px #0007}.top{display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center;padding:8px 10px;font-weight:1000}.title{font-size:16px}.moves{padding:7px 10px;border-radius:12px;background:#0007;color:#fff}.scene{position:relative;min-height:210px;border-radius:24px;overflow:hidden;background:linear-gradient(#33204d,#16071f);border:3px solid #ffffff25;box-shadow:inset 0 0 70px #000,0 12px 30px #0008}.sky{position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,#fff4 0 8%,transparent 18%),linear-gradient(150deg,#4c2a82,#211035 60%)}.danger{position:absolute;left:0;right:0;bottom:0;height:32%;background:linear-gradient(#ffe86a,#ff6926,#8b1232);filter:saturate(1.35);animation:surge 2.2s infinite alternate}.danger.water{background:linear-gradient(#9ff4ff,#148bd9,#044b85)}.danger.fire{background:linear-gradient(#fff16b,#ff4a21,#8b0808)}.danger.ice{background:linear-gradient(#e6fdff,#89c5ff,#3766c8)}.danger.venom{background:linear-gradient(#b7ff65,#18a445,#094c28)}.danger.dark{background:linear-gradient(#dedede,#5b606b,#191923)}@keyframes surge{to{height:44%;filter:brightness(1.16)}}.king{position:absolute;left:50%;top:45%;translate:-50% -50%;font-size:76px;z-index:5;filter:drop-shadow(0 14px 16px #000);animation:king 1s infinite alternate}.king:after{content:'HELP!';position:absolute;left:50%;top:-18px;translate:-50%;font-size:11px;background:#fff;color:#d11936;padding:4px 8px;border-radius:99px;box-shadow:0 5px 10px #0008}.haz{position:absolute;right:22px;top:36px;font-size:58px;z-index:4;filter:drop-shadow(0 8px 10px #000);animation:haz .75s infinite alternate-reverse}.sceneText{position:absolute;left:10px;right:10px;top:9px;text-align:center;background:#0009;border:1px solid #fff3;border-radius:14px;padding:7px;font-weight:1000;z-index:8}.locks{position:absolute;left:10px;right:10px;bottom:10px;z-index:8;text-align:center;font-weight:1000;background:#0008;border:1px solid #fff3;border-radius:14px;padding:8px}.surgeBanner{position:absolute;left:50%;top:56px;translate:-50%;z-index:9;padding:6px 10px;border-radius:999px;background:linear-gradient(90deg,#ff3555,#ff9a24);font-size:12px;font-weight:1000;color:#fff;box-shadow:0 8px 18px #0008;animation:blink .55s infinite alternate}.scene.surgeHit{animation:shake .25s 3}.prop{position:absolute;z-index:3;font-size:30px;filter:drop-shadow(0 6px 8px #000)}@keyframes king{to{transform:translateY(9px) rotate(-2deg)}}@keyframes haz{to{transform:translateY(12px) scale(1.08)}}@keyframes blink{to{filter:brightness(1.4)}}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.objectives{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:7px}.obj{background:#0b0412;border:1px solid #ffffff24;border-radius:14px;padding:6px;min-height:48px;font-weight:1000;font-size:12px}.obj .row{display:flex;justify-content:space-between;gap:3px}.meter{height:8px;background:#050208;border-radius:20px;margin-top:5px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#43ffb6,#ffe96a);box-shadow:0 0 12px #ffe96a}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:#0b0412;border:1px solid #ffffff1d;border-radius:22px;padding:8px;touch-action:none}.tile{aspect-ratio:1;border-radius:14px;display:grid;place-items:center;font-size:28px;font-weight:1000;border:2px solid #ffffff50;background:linear-gradient(145deg,var(--a),var(--b));box-shadow:inset 0 4px 8px #fff6,0 5px 0 #0007;position:relative;user-select:none}.tile.goal{outline:4px solid #fff1a7;animation:pulse .8s infinite alternate}.tile.sel{outline:5px solid #fff}.tile.block{background:linear-gradient(145deg,#9c734c,#3e2515);filter:saturate(.85);font-size:24px}.tile.metal{background:linear-gradient(145deg,#dae5ef,#53606e)}.tile.vine{background:linear-gradient(145deg,#79d84c,#1f5d21)}.tile.hole{background:#040208;color:#fff2;border-color:#ffffff12;box-shadow:none}.tile.power{box-shadow:0 0 24px #fff,inset 0 4px 8px #fff8}.tile.flash{animation:pop .22s}@keyframes pulse{to{filter:brightness(1.25)}}@keyframes pop{50%{scale:1.18}}.hud{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:7px;font-weight:1000}.msg{text-align:center;font-weight:1000;min-height:22px;color:#fff6b8}.map{display:none;grid-template-columns:1fr 1fr;gap:7px;padding:8px;overflow:auto;max-height:44dvh}.map.show{display:grid}.node{border:2px solid #ffd96677;border-radius:18px;padding:10px;background:#140720;text-align:center;font-weight:1000}.node.lock{filter:grayscale(1);opacity:.45}.node.current{box-shadow:0 0 0 3px #fff4 inset}.toast{position:absolute;pointer-events:none;z-index:20;left:50%;top:50%;translate:-50% -50%;font-weight:1000;font-size:26px;color:#fff;text-shadow:0 4px 10px #000;animation:toast .75s forwards}@keyframes toast{to{opacity:0;transform:translateY(-38px) scale(1.2)}}@media(max-height:760px){.scene{min-height:170px}.tile{font-size:24px}.objectives{grid-template-columns:repeat(2,1fr)}.obj{min-height:42px}}
</style>
</head>
<body>
<div id="app">
  <div class="top"><div class="title" id="title"></div><div class="moves" id="moves"></div></div>
  <div class="scene" id="scene"><div class="sky"></div><div class="sceneText" id="copy"></div><div class="surgeBanner" id="surgeBanner"></div><div class="danger" id="danger"></div><div class="haz" id="haz"></div><div class="king">🤴</div><div id="props"></div><div class="locks" id="locks"></div></div>
  <div class="objectives" id="objs"></div>
  <div class="board" id="board"></div>
  <div class="msg" id="msg"></div>
  <div class="hud"><button onclick="showMap()">🗺 Map</button><span id="score"></span><button onclick="start(level)">↻ Restart</button><button id="next" onclick="start(Math.min(level+1,L.length-1))" disabled>Next ▶</button></div>
  <div class="map" id="map"></div>
</div>
<script>
(()=>{
const E=['💧','🪢','🔥','🔑','🔨','🛡️'],N=['Water','Rope','Fire','Key','Hammer','Shield'],C=[['#baf8ff','#168ee7'],['#ffe7a0','#a5601d'],['#ffd35f','#ef3428'],['#fff498','#d49a12'],['#e8f3ff','#657b90'],['#d4c2ff','#7044e5']];
const L=[
 {name:'Lava Drop',haz:'🌋',skin:'lava',copy:'Cut rope chains before the lava elevator reaches the throne.',goal:{1:10},lock:3,lockType:1,lockName:'rope chains',moves:20,block:'crate',surge:'Lava spits rubble onto the board',prop:'🔥'},
 {name:'Flooded Cellar',haz:'🌊',skin:'water',copy:'Keys open drain valves while floodwater rises around the king.',goal:{3:10,0:5},lock:3,lockType:3,lockName:'drain valves',moves:22,block:'crate',surge:'Flood pressure reseals a valve',prop:'💦'},
 {name:'Kitchen Fire',haz:'🔥',skin:'fire',copy:'Douse stove fires with water before smoke fills the kitchen.',goal:{0:12},lock:5,lockType:0,lockName:'stove fires',moves:21,block:'crate',surge:'A stove reignites',prop:'🍳'},
 {name:'Frozen Throne',haz:'🧊',skin:'ice',copy:'Melt ice seals with fire matches and free the trapped throne.',goal:{2:12},lock:4,lockType:2,lockName:'ice seals',moves:23,block:'ice',surge:'Frost spreads over tiles',prop:'❄️'},
 {name:'Dragon Bridge',haz:'🐉',skin:'fire',copy:'Repair bridge planks with hammers while the dragon breathes fire.',goal:{4:12,5:5},lock:4,lockType:4,lockName:'bridge planks',moves:24,block:'metal',surge:'Dragon burns a plank again',prop:'🌉'},
 {name:'Snake Pit',haz:'🐍',skin:'venom',copy:'Break venom cages with shields through tangled vines.',goal:{5:12},lock:5,lockType:5,lockName:'venom cages',moves:22,block:'vine',surge:'Snakes wrap new vines',prop:'🟢'},
 {name:'Saw Trap',haz:'⚙️',skin:'dark',copy:'Smash saw controls with hammers before the blades close in.',goal:{4:13},lock:4,lockType:4,lockName:'saw controls',moves:23,block:'metal',surge:'Saw gears jam the board',prop:'🪚'},
 {name:'Tower Crush',haz:'📌',skin:'dark',copy:'Unlock ceiling pins with keys, then pull ropes before the slab drops.',goal:{3:12,1:8},lock:5,lockType:3,lockName:'ceiling pins',moves:25,block:'metal',surge:'Ceiling drops one notch',prop:'⛓️'},
 {name:'Bee Swarm Garden',haz:'🐝',skin:'venom',copy:'Calm bee swarms with water and shield the king from stings.',goal:{0:12,5:8},lock:5,lockType:5,lockName:'bee swarms',moves:24,block:'vine',surge:'Bees add sticky honeycomb',prop:'🍯'},
 {name:'Mine Cart Collapse',haz:'⛏️',skin:'dark',copy:'Repair rail switches with hammers and keys before boulders fall.',goal:{4:13,3:7},lock:6,lockType:4,lockName:'rail switches',moves:26,block:'metal',surge:'Boulders crack the rails',prop:'🪨'}
];
let B=[],level=0,moves=0,goals={},startGoals={},locks=0,startLocks=0,sel=null,mode='play',score=0,combo=0,surgeIn=4;
let unlocked=+(localStorage.krUnlock||1),stars=JSON.parse(localStorage.krStars||'[]');
const $=id=>document.getElementById(id),R=n=>Math.floor(Math.random()*n),key=(c,r)=>c+','+r;
function holes(i){let shapes=[[[3,3]],[[0,0],[6,6]],[[0,6],[6,0],[3,3]],[[1,1],[5,1],[1,5],[5,5]],[[3,0],[3,6]],[[0,3],[6,3],[3,3]],[[2,2],[4,2],[2,4],[4,4]],[[0,0],[6,0],[0,6],[6,6],[3,3]],[[1,0],[5,0],[0,3],[6,3],[1,6],[5,6]],[[2,0],[4,0],[3,3],[2,6],[4,6]]];return new Set(shapes[i].map(p=>key(p[0],p[1])))}
function start(i=0){level=i;mode='play';sel=null;score=0;combo=0;surgeIn=4;moves=L[i].moves;goals={...L[i].goal};startGoals={...goals};locks=L[i].lock;startLocks=locks;let H=holes(i);B=[];for(let r=0;r<7;r++)for(let c=0;c<7;c++){let hole=H.has(key(c,r)),type=R(6),b=null;if(!hole&&R(10)<(i>5?3:2))b=L[i].block;B.push({c,r,type,hole,block:b,power:''})}seedGoals(i);draw();say('Save the king: '+L[i].copy)}
function seedGoals(i){let need=[+L[i].lockType,...Object.keys(L[i].goal).map(Number)];for(let k of need){for(let n=0;n<4;n++){let t=B.find(x=>!x.hole&&!x.block&&x.type!==k);if(t)t.type=k}}}
function draw(){let l=L[level];$('title').textContent='👑 '+(level+1)+'/'+L.length+' '+l.name;$('moves').textContent=moves+' moves';$('copy').textContent=l.copy;$('haz').textContent=l.haz;$('danger').className='danger '+l.skin;$('locks').textContent=locks?'🔒 '+l.lockName+': '+(startLocks-locks)+'/'+startLocks:'✅ Rescue path open';$('surgeBanner').textContent=mode==='play'?'⚠ '+l.surge+' in '+surgeIn+' moves':'';$('next').disabled=mode!=='won'||level===L.length-1;$('score').textContent='⭐ '+(stars[level]||0)+'  🪙 '+score;drawProps();drawObj();drawBoard();drawMapNodes()}
function drawProps(){let l=L[level],html='';for(let i=0;i<Math.max(3,startLocks);i++){let x=12+(i*17)%74,y=22+(i*13)%48;html+='<span class="prop" style="left:'+x+'%;top:'+y+'%">'+(i<locks?'🔒':l.prop)+'</span>'}$('props').innerHTML=html}
function drawObj(){let html='';for(let k in startGoals){let done=startGoals[k]-(goals[k]||0),p=done/startGoals[k]*100;html+='<div class="obj"><div class="row"><span>'+E[k]+' '+N[k]+'</span><b>'+done+'/'+startGoals[k]+'</b></div><div class="meter"><div class="fill" style="width:'+p+'%"></div></div></div>'}if(startLocks){let p=(startLocks-locks)/startLocks*100;html+='<div class="obj"><div class="row"><span>🔓 '+L[level].lockName+'</span><b>'+(startLocks-locks)+'/'+startLocks+'</b></div><div class="meter"><div class="fill" style="width:'+p+'%"></div></div></div>'}$('objs').innerHTML=html}
function drawBoard(){$('board').innerHTML=B.map((t,i)=>{let cls='tile '+(t.hole?'hole ':'')+(t.block?'block '+t.block+' ':'')+(t.type==L[level].lockType&&!t.hole&&!t.block?'goal ':'')+(goals[t.type]>0&&!t.hole&&!t.block?'goal ':'')+(sel==i?'sel ':'')+(t.power?'power ':'');let face=t.hole?'×':t.block?blockFace(t.block):(t.power||'')+E[t.type];return '<div data-i="'+i+'" class="'+cls+'" style="--a:'+(C[t.type]||C[0])[0]+';--b:'+(C[t.type]||C[0])[1]+'">'+face+'</div>'}).join('');document.querySelectorAll('.tile').forEach(x=>x.onclick=()=>tap(+x.dataset.i))}
function blockFace(b){return b==='metal'?'⚙️':b==='vine'?'🌿':b==='ice'?'🧊':'📦'}
function tap(i){if(mode!=='play')return;let t=B[i];if(!t||t.hole||t.block)return;if(sel==null){sel=i;drawBoard();return}let a=B[sel],d=Math.abs(a.c-t.c)+Math.abs(a.r-t.r);if(d!==1){sel=i;drawBoard();return}swap(a,t);moves--;surgeIn--;let m=matches();if(!m.size){swap(a,t);moves++;surgeIn++;sel=null;say('No match — try swapping adjacent glowing goal tiles.');draw();return}resolve(m);sel=null;if(mode==='play'&&surgeIn<=0)hazardSurge();if(mode==='play'&&moves<=0)lose();draw()}
function swap(a,b){[a.type,b.type]=[b.type,a.type];[a.power,b.power]=[b.power,a.power]}
function matches(){let m=new Set;for(let r=0;r<7;r++)run(B.filter(t=>t.r===r).sort((a,b)=>a.c-b.c),m);for(let c=0;c<7;c++)run(B.filter(t=>t.c===c).sort((a,b)=>a.r-b.r),m);return m}
function run(a,m){let q=[];for(let t of a){if(t.hole||t.block){mark(q,m);q=[]}else if(q.length&&q[0].type!==t.type){mark(q,m);q=[t]}else q.push(t)}mark(q,m)}
function mark(q,m){if(q.length>2)q.forEach(t=>m.add(t))}
function resolve(m){let counts=[0,0,0,0,0,0],big=m.size;combo++;m.forEach(t=>{counts[t.type]++;t.flash=1;t.type=R(6);t.power=big>4?'🌈':big>3?'🚀':'';near(t).forEach(n=>{if(n.block&&R(2)){n.block=null;score+=60}})});for(let k in goals){let v=Math.min(goals[k],counts[k]);goals[k]-=v;score+=v*140}let lockHits=counts[L[level].lockType];if(lockHits&&locks){locks=Math.max(0,locks-lockHits);score+=lockHits*200}if(big>4)rainbowClear();score+=big*20+combo*15;toast((big>4?'RAINBOW! ':big>3?'ROCKET! ':'')+'+'+(big*20));say(big+' tiles cleared. '+(lockHits?'Lock hit! ':'')+(combo>1?'Combo x'+combo:''));if(done())win()}
function rainbowClear(){let typ=R(6);B.forEach(t=>{if(!t.hole&&!t.block&&t.type===typ){t.type=R(6);score+=25}})}
function near(t){return B.filter(n=>Math.abs(n.c-t.c)+Math.abs(n.r-t.r)===1)}
function hazardSurge(){let l=L[level];surgeIn=4;combo=0;$('scene').classList.add('surgeHit');setTimeout(()=>$('scene').classList.remove('surgeHit'),700);if(locks&&level%3!==0){locks=Math.min(startLocks,locks+1)}else{let free=B.filter(t=>!t.hole&&!t.block);for(let i=0;i<2+Math.floor(level/4);i++){let t=free[R(free.length)];if(t)t.block=l.block}}moves=Math.max(0,moves-1);say('⚠ Hazard surge: '+l.surge+'!')}
function done(){return locks<1&&Object.values(goals).every(v=>v<1)}
function win(){mode='won';let s=moves>8?3:moves>3?2:1;stars[level]=Math.max(stars[level]||0,s);unlocked=Math.max(unlocked,Math.min(L.length,level+2));localStorage.krUnlock=unlocked;localStorage.krStars=JSON.stringify(stars);toast('KING SAVED!');say('⭐ King saved! '+s+' stars. Next rescue unlocked.');draw()}
function lose(){mode='lost';toast('TRY AGAIN');say('Danger reached the king — focus goals before each hazard surge.');draw()}
function say(s){$('msg').textContent=s}
function toast(s){let d=document.createElement('div');d.className='toast';d.textContent=s;document.body.appendChild(d);setTimeout(()=>d.remove(),760)}
function showMap(){$('map').classList.toggle('show');drawMapNodes()}
function drawMapNodes(){let html=L.map((l,i)=>'<div class="node '+(i>=unlocked?'lock ':'')+(i===level?'current':'')+'" '+(i<unlocked?'onclick="start('+i+')"':'')+'>'+ (i+1)+'. '+l.haz+' '+l.name+'<br>'+(i<unlocked?(stars[i]?'⭐'.repeat(stars[i]):'Play'):'Locked')+'</div>').join('');$('map').innerHTML=html}
window.__gameTest={start,showMap,forceWin:()=>{for(let k in goals)goals[k]=0;locks=0;win()},forceSurge:()=>{hazardSurge();draw()},getState:()=>({mode,level,levels:L.length,name:L[level].name,moves,goals,locks,unlocked,nextDisabled:$('next').disabled,hasPowerUps:true,hasMap:true,hasObjectiveCards:true,hasHazardSurge:true,surgeIn,score,grid:B.length})};
start(0)
})();
</script>
</body>
</html>
