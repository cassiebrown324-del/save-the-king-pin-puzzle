<!doctype html><html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>Save the King — Royal Rescue Match</title><style>body{margin:0;background:radial-gradient(circle at top,#7956ff,#180522 60%,#050007);color:#fff0b8;font-family:system-ui;display:grid;place-items:center}#app{width:min(610px,100vw);min-height:100vh;padding:10px;display:grid;gap:8px}.card,.scene,.goals,.tools,.board,.map{background:#140620dd;border:1px solid #fff3;border-radius:18px;padding:8px;box-shadow:0 12px 28px #0008}.top,.hud{display:flex;justify-content:space-between;align-items:center;font-weight:900}.scene{height:230px;position:relative;overflow:hidden;background:linear-gradient(#4a267d,#140620)}.danger{position:absolute;inset:auto 0 0;height:42%;animation:rise 1.2s infinite alternate}.lava,.fire{background:linear-gradient(#ffe86b,#ff501d,#71061d)}.water{background:linear-gradient(#c8fbff,#168ee5,#05265b)}.ice,.storm{background:linear-gradient(#f7ffff,#7dbdff,#304aa8)}.venom{background:linear-gradient(#dfff6d,#28b64e,#062d19)}.sand{background:linear-gradient(#fff0a6,#d79738,#56300c)}.dark{background:linear-gradient(#eee,#666,#111)}@keyframes rise{to{height:53%}}.king{position:absolute;left:50%;top:48%;translate:-50% -50%;font-size:82px;z-index:4;filter:drop-shadow(0 10px 10px #000);animation:bob .75s infinite alternate}.king:after{content:'HELP!';position:absolute;top:-12px;left:50%;translate:-50%;font-size:11px;background:white;color:#d51b3f;border-radius:99px;padding:3px 8px}@keyframes bob{to{transform:translateY(8px)}}.haz{position:absolute;right:22px;top:50px;font-size:62px;z-index:3}.copy,.warn{position:absolute;z-index:7;left:8px;right:8px;text-align:center;background:#000b;border:1px solid #fff5;border-radius:14px;padding:7px;font-weight:900}.copy{top:8px}.warn{top:50px;left:50%;right:auto;translate:-50%;white-space:nowrap;background:linear-gradient(90deg,#ff2e55,#ffac21)}.panel{position:absolute;top:88px;z-index:6;background:#08020fdc;border:1px solid #ffd96666;border-radius:14px;padding:7px;font-size:11px;font-weight:900;width:172px}.left{left:8px}.right{right:8px}.pill{display:inline-block;border-radius:99px;background:#d92649;padding:4px 8px}.open,.done{background:#0d693f!important}.row{display:flex;justify-content:space-between;gap:6px;margin-top:5px;padding:4px 5px;background:#0009;border:1px solid #fff2;border-radius:10px}.bar{height:8px;background:#08020d;border-radius:99px;overflow:hidden;margin-top:5px}.bar b{display:block;height:100%;background:linear-gradient(90deg,#45ffb2,#ffe56e,#ff3155)}.prop{position:absolute;font-size:30px}.goals,.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.goal{background:#07020e;border:1px solid #fff2;border-radius:13px;padding:6px;font-weight:900;font-size:12px}button{border:0;border-radius:13px;background:linear-gradient(#fff6bd,#ffc22d);color:#361321;font-weight:900;padding:8px 6px;box-shadow:0 4px 0 #7d4b04}button:disabled{filter:grayscale(1);opacity:.45}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.tile{aspect-ratio:1;border-radius:13px;display:grid;place-items:center;font-size:27px;background:linear-gradient(145deg,#fff8,#0003),var(--bg);border:2px solid #ffffff55;box-shadow:inset 0 4px 8px #fff5,0 5px 0 #0007}.need{outline:4px solid #fff0a7}.sel{outline:5px solid white}.block{background:linear-gradient(145deg,#a87947,#39200f)}.hole{background:#050208;color:#fff2;border-color:#ffffff12;box-shadow:none}.pow{box-shadow:0 0 23px #fff}.msg{text-align:center;font-weight:900;min-height:22px}.map{display:none;position:absolute;z-index:30;left:8px;right:8px;bottom:54px;max-height:55vh;overflow:auto;grid-template-columns:1fr 1fr;gap:7px}.map.show{display:grid}.node{border:2px solid #ffd96677;border-radius:16px;padding:9px;background:#12061d;text-align:center;font-weight:900}.locked{filter:grayscale(1);opacity:.45}.toast{position:fixed;z-index:50;left:50%;top:50%;translate:-50% -50%;font-size:26px;font-weight:900;text-shadow:0 4px 10px #000;animation:t .85s forwards}@keyframes t{to{opacity:0;transform:translateY(-44px) scale(1.2)}}.shake{animation:s .18s 4}@keyframes s{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}</style></head><body><div id=app><div class='top card'><div id=title></div><div id=moves></div></div><div id=scene class=scene><div id=copy class=copy></div><div id=warn class=warn></div><div id=danger class='danger lava'></div><div id=haz class=haz></div><div class=king>🤴</div><div id=props></div><div id=pins class='panel left'></div><div id=beats class='panel right'></div></div><div id=goals class=goals></div><div id=tools class=tools></div><div id=board class=board></div><div id=msg class=msg></div><div class='hud card'><button onclick=showMap()>🗺 Map</button><span id=score></span><button onclick='start(__gameTest.getState().lvl)'>↻</button><button id=next onclick='start(Math.min(__gameTest.getState().lvl+1,__gameTest.getState().levels-1))'>Next ▶</button></div><div id=map class=map></div></div><script>(()=>{const E=['💧','🪢','🔥','🔑','🔨','🛡️'],N=['Water','Rope','Fire','Key','Hammer','Shield'],BG=['#13a9ef','#b06a22','#ef3c25','#e0a91a','#718095','#744fe2'];const levels=[['Lava Drop','🌋','lava','Cut rope chains before lava reaches the throne.',{1:10},3,1,'rope chains','crate','Lava throws rubble','🔥'],['Flooded Cellar','🌊','water','Open drain valves with keys while floodwater rises.',{3:10,0:5},3,3,'drain valves','crate','Flood reseals a valve','💦'],['Kitchen Fire','🔥','fire','Douse stove fires with water before smoke fills the kitchen.',{0:12},5,0,'stove fires','crate','A stove reignites','🍳'],['Frozen Throne','🧊','ice','Melt ice seals with fire tiles and free the throne.',{2:12},4,2,'ice seals','ice','Frost spreads','❄️'],['Dragon Bridge','🐉','fire','Repair bridge planks with hammers while dragon fire closes in.',{4:12,5:5},4,4,'bridge planks','metal','Dragon burns a plank','🌉'],['Snake Pit','🐍','venom','Break venom cages with shields through tangled vines.',{5:12},5,5,'venom cages','vine','Snakes wrap vines','🟢'],['Saw Trap','⚙️','dark','Smash saw controls with hammers before blades close.',{4:13},4,4,'saw controls','metal','Saw gears jam','🪚'],['Tower Crush','📌','dark','Unlock ceiling pins with keys, then pull ropes.',{3:12,1:8},5,3,'ceiling pins','metal','Ceiling drops','⛓️'],['Bee Swarm Garden','🐝','venom','Calm bee swarms with water and shield the king.',{0:12,5:8},5,5,'bee swarms','vine','Bees add honeycomb','🍯'],['Mine Cart Collapse','⛏️','dark','Repair rail switches before boulders crush the cart.',{4:13,3:7},6,4,'rail switches','metal','Boulders crack rails','🪨'],['Ghost Library','👻','dark','Light cursed candles with fire tiles before ghosts seal the shelves.',{2:14,3:6},6,2,'cursed candles','vine','Ghosts relock candles','🕯️'],['Whirlpool Harbor','⚓','water','Drop anchors with rope and keys before the whirlpool swallows the dock.',{1:12,3:8},6,1,'harbor anchors','crate','Whirlpool floods docks','⚓'],['Mummy Tomb','🏺','sand','Break ancient seals with hammers and keys before sand buries the king.',{4:14,3:8},7,4,'tomb seals','metal','Sand fills the chamber','🧱'],['Storm Balcony','⛈️','storm','Pull rope conductors and raise shields before lightning strikes the tower.',{1:14,5:9},7,5,'lightning rods','vine','Lightning charges rods','⚡'],['Clockwork Dungeon','🕰️','dark','Smash clock gears before walls grind inward.',{4:15,3:9},7,3,'time pins','metal','Gears rewind progress','⚙️'],['Final Crown Siege','👑','fire','Charge the Crown Cannon and break every royal lock.',{0:8,1:8,2:8,3:8,4:8,5:8},8,3,'royal crown locks','metal','Final siege relocks crown','💥']];let B=[],lvl=0,moves=0,goals={},startGoals={},locks=0,startLocks=0,sel=null,mode='play',score=0,surge=4,crown=0,tools={},unlocked=+(localStorage.krUnlock||1),stars=JSON.parse(localStorage.krStars||'[]');const $=i=>document.getElementById(i),R=n=>Math.floor(Math.random()*n),K=(c,r)=>c+','+r;function holes(i){let p=[[[3,3]],[[0,0],[6,6]],[[0,6],[6,0],[3,3]],[[1,1],[5,1],[1,5],[5,5]],[[3,0],[3,6]],[[0,3],[6,3],[3,3]],[[2,2],[4,2],[2,4],[4,4]],[[0,0],[6,0],[0,6],[6,6],[3,3]],[[1,0],[5,0],[0,3],[6,3],[1,6],[5,6]],[[2,0],[4,0],[3,3],[2,6],[4,6]],[[0,1],[6,1],[3,3],[0,5],[6,5]],[[1,0],[5,0],[2,3],[4,3],[1,6],[5,6]],[[0,2],[6,2],[3,3],[0,4],[6,4]],[[2,1],[4,1],[1,5],[5,5],[3,3]]];return new Set(p[i%p.length].map(x=>K(x[0],x[1])))}function start(i=0){lvl=i;mode='play';sel=null;score=0;surge=4;crown=0;tools={hammer:1,splash:1,key:1};let l=levels[i];moves=20+Math.min(7,i);goals={...l[4]};startGoals={...goals};locks=l[5];startLocks=locks;let H=holes(i);B=[];for(let r=0;r<7;r++)for(let c=0;c<7;c++){let h=H.has(K(c,r));B.push({c,r,h,type:R(6),block:!h&&R(10)<(i>5?3:2)?l[8]:'',p:''})}seed();draw();say('Save the king: '+l[3])}function seed(){[levels[lvl][6],...Object.keys(goals).map(Number)].forEach(k=>{for(let n=0;n<7;n++){let t=B.find(x=>!x.h&&!x.block&&x.type!=k);if(t)t.type=k}})}function draw(){let l=levels[lvl];$('title').textContent='👑 '+(lvl+1)+'/'+levels.length+' '+l[0];$('moves').textContent=moves+' moves';$('copy').textContent=l[3];$('haz').textContent=l[1];$('danger').className='danger '+l[2];$('warn').textContent=mode=='play'?'⚠ '+l[9]+' in '+surge+' moves':'';$('score').textContent='⭐ '+(stars[lvl]||0)+' 👑 '+crown+'% 🪙 '+score;$('next').disabled=mode!='won'||lvl==levels.length-1;props();pins();beats();drawGoals();drawTools();drawBoard();drawMap()}function props(){let l=levels[lvl],h='';for(let i=0;i<Math.max(4,startLocks);i++)h+=`<span class=prop style='left:${10+i*16%78}%;top:${24+i*12%52}%'>${i<locks?'🔒':l[10]}</span>`;$('props').innerHTML=h}function pins(){let l=levels[lvl],h=`<span class='pill ${locks?'':'open'}'>${locks?'KING TRAPPED':'ESCAPE OPEN'}</span>`;for(let i=0;i<startLocks;i++)h+=`<div class='row ${i<startLocks-locks?'done':''}'><span>${i<startLocks-locks?'✅':'🔒'} ${i+1}. ${l[7].replace(/s$/,'')}</span><b>${E[l[6]]}</b></div>`;h+=`<div class=row>Match ${E[l[6]]} or use tools</div>`;$('pins').innerHTML=h}function beats(){let l=levels[lvl],gd=Object.values(goals).every(v=>v<1),ld=locks<1,p=Math.max(8,Math.min(100,Math.round((1-moves/(20+Math.min(7,lvl)))*100+lvl*3)));$('beats').innerHTML=`<b>🎬 CANNON RESCUE BEATS</b><div class='row done'>1 ✅ King in danger ${l[1]}</div><div class='row ${gd?'done':''}'>2 ${gd?'✅':'⬜'} Goals cleared</div><div class='row ${ld?'done':''}'>3 ${ld?'✅':'⬜'} Open ${l[7]}</div><div class=bar><b style='width:${p}%'></b></div>`}function drawGoals(){let h='';for(let k in startGoals){let d=startGoals[k]-(goals[k]||0),p=100*d/startGoals[k];h+=`<div class=goal><div>${E[k]} ${N[k]} <b>${d}/${startGoals[k]}</b></div><div class=bar><b style='width:${p}%'></b></div></div>`}h+=`<div class=goal><div>🔓 ${levels[lvl][7]} <b>${startLocks-locks}/${startLocks}</b></div><div class=bar><b style='width:${100*(startLocks-locks)/startLocks}%'></b></div></div>`;$('goals').innerHTML=h}function drawTools(){$('tools').innerHTML=[['hammer','🔨 Royal Hammer','break/collect'],['splash','💧 Water Splash','clear rescue tiles'],['key','🔑 Key Ring','open 1 lock']].map((x,i)=>`<button onclick=useTool(${i}) ${!tools[x[0]]||x[0]=='key'&&!locks?'disabled':''}>${x[1]}<small>${x[2]}</small></button>`).join('')+`<button onclick=fireCrown() ${crown<100?'disabled':''}>👑 Crown Cannon<small>${crown}% charged</small></button>`}function drawBoard(){$('board').innerHTML=B.map((t,i)=>`<div data-i=${i} class='tile ${t.h?'hole ':''}${t.block?'block ':''}${sel==i?'sel ':''}${t.p?'pow ':''}${!t.h&&!t.block&&(goals[t.type]>0||t.type==levels[lvl][6])?'need ':''}' style='--bg:${BG[t.type]}'>${t.h?'×':t.block?({metal:'⚙️',vine:'🌿',ice:'🧊',crate:'📦'}[t.block]||'📦'):(t.p||'')+E[t.type]}</div>`).join('');document.querySelectorAll('.tile').forEach(x=>x.onclick=()=>tap(+x.dataset.i))}function tap(i){let t=B[i];if(mode!='play'||!t||t.h||t.block)return;if(sel==null){sel=i;drawBoard();return}let a=B[sel],d=Math.abs(a.c-t.c)+Math.abs(a.r-t.r);if(d!=1){sel=i;drawBoard();return}swap(a,t);moves--;surge--;if(a.p||t.p){power(a.p?a:t);sel=null;after();return}let m=matches();if(!m.size){swap(a,t);moves++;surge++;sel=null;say('No match — swap adjacent rescue tiles.');draw();return}resolve(m);sel=null;after()}function swap(a,b){[a.type,b.type]=[b.type,a.type];[a.p,b.p]=[b.p,a.p]}function matches(){let s=new Set;for(let r=0;r<7;r++)run(B.filter(t=>t.r==r).sort((a,b)=>a.c-b.c),s);for(let c=0;c<7;c++)run(B.filter(t=>t.c==c).sort((a,b)=>a.r-b.r),s);return s}function run(a,s){let q=[];for(let t of a){if(t.h||t.block||q.length&&q[0].type!=t.type){if(q.length>2)q.forEach(x=>s.add(x));q=t.h||t.block?[]:[t]}else q.push(t)}if(q.length>2)q.forEach(x=>s.add(x))}function apply(c,m=120){let made=0;for(let k in goals){let v=Math.min(goals[k],c[k]);goals[k]-=v;score+=v*m;made+=v}let hit=c[levels[lvl][6]];if(hit&&locks){locks=Math.max(0,locks-hit);score+=hit*(m+60);made+=hit}crown=Math.min(100,crown+made*9)}function resolve(s){let c=[0,0,0,0,0,0],big=s.size,first=[...s][0];s.forEach(t=>{c[t.type]++;t.type=R(6);t.p=''});if(big>3)first.p=big>4?'🌈':'🚀';apply(c);score+=big*30;toast(big>4?'RAINBOW MADE!':big>3?'ROCKET MADE!':'+'+big);say(big+' rescue tiles cleared')}function power(t){let c=[0,0,0,0,0,0],p=t.p;t.p='';if(p=='🌈'){let typ=t.type;B.forEach(x=>{if(!x.h&&!x.block&&x.type==typ){c[x.type]++;x.type=R(6)}});say('🌈 Rainbow cleared every '+E[typ])}else{let row=R(2);B.forEach(x=>{if(row&&x.r==t.r||!row&&x.c==t.c){if(x.block)x.block='';else{c[x.type]++;x.type=R(6)}}});say('🚀 Rocket blasted the trap line')}apply(c,150);toast(p=='🌈'?'RAINBOW RESCUE!':'ROCKET BLAST!')}function after(){if(done())win();else{if(surge<=0)hazard();if(moves<=0)lose()}draw()}function hazard(){surge=4;$('scene').classList.add('shake');setTimeout(()=>$('scene').classList.remove('shake'),600);if(locks&&lvl%3)locks=Math.min(startLocks,locks+1);else B.filter(t=>!t.h&&!t.block).slice(0,2+Math.floor(lvl/4)).forEach(t=>t.block=levels[lvl][8]);moves=Math.max(0,moves-1);say('⚠ Hazard surge: '+levels[lvl][9]+'!')}function useTool(i){let k=['hammer','splash','key'][i];if(!tools[k]||mode!='play')return;tools[k]=0;if(k=='key'&&locks){locks--;score+=180}else if(k=='hammer'){let t=B.find(x=>x.block&&!x.h)||B.find(x=>!x.h&&goals[x.type]>0);if(t){if(t.block)t.block='';else goals[t.type]=Math.max(0,goals[t.type]-1)}score+=140}else{let c=0;B.sort(()=>Math.random()-.5).forEach(t=>{if(c<5&&!t.h&&!t.block&&(goals[t.type]>0||t.type==levels[lvl][6])){if(goals[t.type]>0)goals[t.type]--;if(t.type==levels[lvl][6]&&locks)locks--;t.type=R(6);c++}});score+=c*95}after()}function fireCrown(){if(mode!='play'||crown<100)return;crown=0;let opened=Math.min(2,locks);locks-=opened;let cut=0;for(let k in goals){let v=Math.min(3,goals[k]);goals[k]-=v;cut+=v}let smashed=0;B.forEach(t=>{if(smashed<4&&t.block){t.block='';smashed++}});score+=700+cut*120+opened*250;say('👑 Crown Cannon opened locks, collected goals, smashed blockers.');toast('CROWN CANNON!');after()}function done(){return locks<1&&Object.values(goals).every(v=>v<1)}function win(){mode='won';stars[lvl]=Math.max(stars[lvl]||0,moves>8?3:moves>3?2:1);unlocked=Math.max(unlocked,Math.min(levels.length,lvl+2));localStorage.krUnlock=unlocked;localStorage.krStars=JSON.stringify(stars);toast('KING SAVED!');say('⭐ King saved! Next rescue unlocked.')}function lose(){mode='lost';toast('TRY AGAIN');say('Danger reached the king — use rockets, tools, and goal tiles faster.')}function say(s){$('msg').textContent=s}function toast(s){let d=document.createElement('div');d.className='toast';d.textContent=s;document.body.appendChild(d);setTimeout(()=>d.remove(),850)}function showMap(){$('map').classList.toggle('show');drawMap()}function drawMap(){$('map').innerHTML=levels.map((l,i)=>`<div class='node ${i>=unlocked?'locked':''}' ${i<unlocked?`onclick=start(${i})`:''}>${i+1}. ${l[1]} ${l[0]}<br>${i<unlocked?(stars[i]?'⭐'.repeat(stars[i]):'Play'):'Locked'}</div>`).join('')}window.start=start;window.showMap=showMap;window.useTool=useTool;window.fireCrown=fireCrown;window.__gameTest={start,showMap,useTool,forceWin:()=>{for(let k in goals)goals[k]=0;locks=0;win();draw()},forceSurge:()=>{hazard();draw()},getState:()=>({mode,lvl,levels:levels.length,name:levels[lvl][0],moves,goals,locks,unlocked,nextDisabled:$('next').disabled,hasMap:true,hasHazardSurge:true,hasPinPanel:true,hasRoyalTools:true,hasFunctionalPowerUps:true,hasCinematicMission:true,hasCampaignExpansion:true,hasFourteenLevelCampaign:levels.length>=14,hasSixteenLevelCampaign:levels.length>=16,hasNewSandStormScenes:true,hasCrownCannon:true,hasInlineHandlersFixed:true,crown,grid:B.length})};start(0)})();</script></body></html>
