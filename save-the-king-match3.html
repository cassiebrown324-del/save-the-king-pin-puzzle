<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Save the King — Royal Rescue Match</title><style>*{box-sizing:border-box}body{margin:0;height:100dvh;overflow:hidden;background:radial-gradient(circle at 50% -10%,#865cff,#24103d 55%,#07020d);font-family:ui-rounded,system-ui,sans-serif;color:#fff2c6}#app{width:min(610px,100vw);height:100%;margin:auto;padding:8px;display:grid;grid-template-rows:auto 228px auto auto 1fr auto;gap:7px}.card,.top,.scene,.goals,.tools,.board,.map{background:#140620dd;border:1px solid #fff3;border-radius:18px;box-shadow:0 12px 28px #0008}.top,.hud{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-weight:1000}.scene{position:relative;overflow:hidden;border-radius:24px;background:linear-gradient(#43266f,#12051d)}.danger{position:absolute;left:0;right:0;bottom:0;height:38%;animation:rise 1.8s infinite alternate}.lava{background:linear-gradient(#ffe968,#ff5c21,#7c0929)}.water{background:linear-gradient(#bffaff,#168ad8,#073a76)}.fire{background:linear-gradient(#fff06a,#ff3c22,#750606)}.ice{background:linear-gradient(#f4ffff,#8bcaff,#3758ba)}.venom{background:linear-gradient(#d4ff67,#2dbd4a,#063b1e)}.dark{background:linear-gradient(#e3e3e3,#666,#15151c)}@keyframes rise{to{height:48%;filter:brightness(1.2)}}.king{position:absolute;z-index:5;left:50%;top:46%;translate:-50% -50%;font-size:78px;filter:drop-shadow(0 12px 15px #000);animation:bob .85s infinite alternate}.king:after{content:'HELP!';position:absolute;top:-13px;left:50%;translate:-50%;font-size:11px;background:#fff;color:#d31e43;border-radius:99px;padding:4px 8px}.haz{position:absolute;right:18px;top:42px;font-size:60px;z-index:4;animation:bob .7s infinite alternate-reverse}.copy,.warn{position:absolute;z-index:8;left:8px;right:8px;text-align:center;background:#000a;border:1px solid #fff4;border-radius:14px;padding:7px;font-weight:1000}.copy{top:8px}.warn{top:48px;left:50%;right:auto;translate:-50%;background:linear-gradient(90deg,#ff3155,#ff9a22);border-radius:99px;white-space:nowrap}.panel{position:absolute;z-index:7;top:78px;background:#08020fcc;border:1px solid #ffd96666;border-radius:16px;padding:7px;font-weight:1000}.left{left:8px;width:166px}.right{right:8px;width:176px}.badge{display:inline-block;border-radius:99px;background:#e6314d;padding:4px 7px;font-size:10px}.open{background:#20bf75}.beat,.pin{display:flex;justify-content:space-between;gap:5px;margin-top:4px;padding:4px 5px;border-radius:10px;background:#0009;border:1px solid #fff2;font-size:10px}.done{background:#0e523b;color:#dffff0}.peril{height:8px;background:#250313;border-radius:99px;overflow:hidden;margin-top:6px}.peril b{display:block;height:100%;background:linear-gradient(90deg,#25ffad,#ffe35e,#ff3155)}.prop{position:absolute;font-size:29px;filter:drop-shadow(0 6px 8px #000)}@keyframes bob{to{transform:translateY(9px) rotate(-2deg)}}.shake{animation:shake .18s 4}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.goals,.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:7px}.goal{background:#07020e;border:1px solid #fff2;border-radius:13px;padding:6px;font-weight:1000;font-size:12px}.bar{height:7px;background:#050208;border-radius:99px;overflow:hidden;margin-top:5px}.bar b{display:block;height:100%;background:linear-gradient(90deg,#4dffb3,#ffe86a)}button{border:0;border-radius:13px;background:linear-gradient(#fff6bd,#ffbe2e);color:#361321;font-weight:1000;padding:8px 6px;box-shadow:0 4px 0 #7d4b04}button:disabled{filter:grayscale(1);opacity:.45}.tools small{display:block;font-size:10px}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:8px;touch-action:none}.tile{aspect-ratio:1;border-radius:13px;display:grid;place-items:center;font-size:27px;border:2px solid #ffffff50;background:linear-gradient(145deg,#fff8,#0003),var(--bg);box-shadow:inset 0 4px 8px #fff5,0 5px 0 #0007;user-select:none}.need{outline:4px solid #fff0a7}.sel{outline:5px solid #fff}.block{background:linear-gradient(145deg,#a87947,#39200f)}.hole{background:#040208;color:#fff2;border-color:#ffffff12;box-shadow:none}.pow{box-shadow:0 0 23px #fff,inset 0 4px 8px #fff8}.msg{text-align:center;font-weight:1000;color:#fff3a8;min-height:22px}.map{display:none;grid-template-columns:1fr 1fr;gap:7px;padding:8px;position:absolute;z-index:30;left:8px;right:8px;bottom:54px;max-height:55dvh;overflow:auto}.map.show{display:grid}.node{border:2px solid #ffd96677;border-radius:16px;padding:9px;background:#12061d;text-align:center;font-weight:1000}.locked{filter:grayscale(1);opacity:.45}.toast{position:absolute;z-index:50;left:50%;top:50%;translate:-50% -50%;font-size:26px;font-weight:1000;text-shadow:0 4px 10px #000;animation:toast .85s forwards}@keyframes toast{to{opacity:0;transform:translateY(-44px) scale(1.2)}}@media(max-height:760px){#app{grid-template-rows:auto 180px auto auto 1fr auto}.tile{font-size:23px}.goals{grid-template-columns:repeat(2,1fr)}} </style></head><body><div id='app'><div class='top'><div id='title'></div><div id='moves'></div></div><div class='scene' id='scene'><div class='copy' id='copy'></div><div class='warn' id='warn'></div><div id='danger' class='danger lava'></div><div class='haz' id='haz'></div><div class='king'>🤴</div><div id='props'></div><div class='panel left' id='pins'></div><div class='panel right' id='beats'></div></div><div class='goals' id='goals'></div><div class='tools' id='tools'></div><div class='board' id='board'></div><div class='msg' id='msg'></div><div class='hud card'><button onclick='showMap()'>🗺 Map</button><span id='score'></span><button onclick='start(lvl)'>↻</button><button id='next' onclick='start(Math.min(lvl+1,levels.length-1))'>Next ▶</button></div><div class='map' id='map'></div></div><script>(()=>{const E=['💧','🪢','🔥','🔑','🔨','🛡️'],N=['Water','Rope','Fire','Key','Hammer','Shield'],BG=['#13a9ef','#b06a22','#ef3c25','#e0a91a','#718095','#744fe2'],levels=[['Lava Drop','🌋','lava','Cut rope chains before lava reaches the throne.',{1:10},3,1,'rope chains','crate','Lava throws rubble','🔥'],['Flooded Cellar','🌊','water','Open drain valves with keys while floodwater rises.',{3:10,0:5},3,3,'drain valves','crate','Flood reseals a valve','💦'],['Kitchen Fire','🔥','fire','Douse stove fires with water before smoke fills the kitchen.',{0:12},5,0,'stove fires','crate','A stove reignites','🍳'],['Frozen Throne','🧊','ice','Melt ice seals with fire tiles and free the throne.',{2:12},4,2,'ice seals','ice','Frost spreads','❄️'],['Dragon Bridge','🐉','fire','Repair bridge planks with hammers while dragon fire closes in.',{4:12,5:5},4,4,'bridge planks','metal','Dragon burns a plank','🌉'],['Snake Pit','🐍','venom','Break venom cages with shields through tangled vines.',{5:12},5,5,'venom cages','vine','Snakes wrap vines','🟢'],['Saw Trap','⚙️','dark','Smash saw controls with hammers before blades close.',{4:13},4,4,'saw controls','metal','Saw gears jam','🪚'],['Tower Crush','📌','dark','Unlock ceiling pins with keys, then pull ropes.',{3:12,1:8},5,3,'ceiling pins','metal','Ceiling drops','⛓️'],['Bee Swarm Garden','🐝','venom','Calm bee swarms with water and shield the king.',{0:12,5:8},5,5,'bee swarms','vine','Bees add honeycomb','🍯'],['Mine Cart Collapse','⛏️','dark','Repair rail switches before boulders crush the cart.',{4:13,3:7},6,4,'rail switches','metal','Boulders crack rails','🪨'],['Ghost Library','👻','dark','Light cursed candles with fire tiles before ghosts seal the shelves.',{2:14,3:6},6,2,'cursed candles','vine','Ghosts relock candles','🕯️'],['Whirlpool Harbor','⚓','water','Drop anchors with rope and keys before the whirlpool swallows the dock.',{1:12,3:8},6,1,'harbor anchors','crate','Whirlpool floods docks','⚓']];let B=[],lvl=0,moves=0,goals={},startGoals={},locks=0,startLocks=0,sel=null,mode='play',score=0,surge=4,tools={},unlocked=+(localStorage.krUnlock||1),stars=JSON.parse(localStorage.krStars||'[]');const $=i=>document.getElementById(i),R=n=>Math.floor(Math.random()*n),K=(c,r)=>c+','+r;function holes(i){let p=[[[3,3]],[[0,0],[6,6]],[[0,6],[6,0],[3,3]],[[1,1],[5,1],[1,5],[5,5]],[[3,0],[3,6]],[[0,3],[6,3],[3,3]],[[2,2],[4,2],[2,4],[4,4]],[[0,0],[6,0],[0,6],[6,6],[3,3]],[[1,0],[5,0],[0,3],[6,3],[1,6],[5,6]],[[2,0],[4,0],[3,3],[2,6],[4,6]],[[0,1],[6,1],[3,3],[0,5],[6,5]],[[1,0],[5,0],[2,3],[4,3],[1,6],[5,6]]];return new Set(p[i%p.length].map(x=>K(x[0],x[1])))}function start(i=0){lvl=i;mode='play';sel=null;score=0;surge=4;tools={hammer:1,splash:1,key:1};let l=levels[i];moves=20+Math.min(7,i);goals={...l[4]};startGoals={...goals};locks=l[5];startLocks=locks;let H=holes(i);B=[];for(let r=0;r<7;r++)for(let c=0;c<7;c++){let h=H.has(K(c,r));B.push({c,r,h,type:R(6),block:!h&&R(10)<(i>5?3:2)?l[8]:'',p:''})}seed();draw();say('Save the king: '+l[3])}function seed(){[levels[lvl][6],...Object.keys(goals).map(Number)].forEach(k=>{for(let n=0;n<6;n++){let t=B.find(x=>!x.h&&!x.block&&x.type!=k);if(t)t.type=k}})}function draw(){let l=levels[lvl];$('title').textContent='👑 '+(lvl+1)+'/'+levels.length+' '+l[0];$('moves').textContent=moves+' moves';$('copy').textContent=l[3];$('haz').textContent=l[1];$('danger').className='danger '+l[2];$('warn').textContent=mode=='play'?'⚠ '+l[9]+' in '+surge+' moves':'';$('score').textContent='⭐ '+(stars[lvl]||0)+' 🪙 '+score;$('next').disabled=mode!='won'||lvl==levels.length-1;props();pins();beats();drawGoals();drawTools();drawBoard();drawMap()}function props(){let l=levels[lvl],h='';for(let i=0;i<Math.max(4,startLocks);i++)h+=`<span class='prop' style='left:${10+i*16%78}%;top:${24+i*12%52}%'>${i<locks?'🔒':l[10]}</span>`;$('props').innerHTML=h}function pins(){let l=levels[lvl],h=`<span class='badge ${locks?'':'open'}'>${locks?'KING TRAPPED':'ESCAPE OPEN'}</span>`;for(let i=0;i<startLocks;i++)h+=`<div class='pin ${i<startLocks-locks?'done':''}'><span>${i<startLocks-locks?'✅':'🔒'} ${i+1}. ${l[7].replace(/s$/,'')}</span><b>${E[l[6]]}</b></div>`;h+=`<div class='pin'>Match ${E[l[6]]} or use tools</div>`;$('pins').innerHTML=h}function beats(){let l=levels[lvl],gd=Object.values(goals).every(v=>v<1),ld=locks<1,p=Math.max(8,Math.min(100,Math.round((1-moves/(20+Math.min(7,lvl)))*100+lvl*3)));$('beats').innerHTML=`<b>🎬 RESCUE BEATS</b><div class='beat done'>1 ✅ King in danger ${l[1]}</div><div class='beat ${gd?'done':''}'>2 ${gd?'✅':'⬜'} Goals cleared</div><div class='beat ${ld?'done':''}'>3 ${ld?'✅':'⬜'} Open ${l[7]}</div><div class='peril'><b style='width:${p}%'></b></div>`}function drawGoals(){let h='';for(let k in startGoals){let d=startGoals[k]-(goals[k]||0),p=100*d/startGoals[k];h+=`<div class='goal'><div>${E[k]} ${N[k]} <b>${d}/${startGoals[k]}</b></div><div class='bar'><b style='width:${p}%'></b></div></div>`}h+=`<div class='goal'><div>🔓 ${levels[lvl][7]} <b>${startLocks-locks}/${startLocks}</b></div><div class='bar'><b style='width:${100*(startLocks-locks)/startLocks}%'></b></div></div>`;$('goals').innerHTML=h}function drawTools(){$('tools').innerHTML=[['hammer','🔨 Royal Hammer','break/collect'],['splash','💧 Water Splash','clear rescue tiles'],['key','🔑 Key Ring','open 1 lock']].map((x,i)=>`<button onclick='useTool(${i})' ${!tools[x[0]]||x[0]=='key'&&!locks?'disabled':''}>${x[1]}<small>${x[2]}</small></button>`).join('')}function drawBoard(){$('board').innerHTML=B.map((t,i)=>`<div data-i='${i}' class='tile ${t.h?'hole ':''}${t.block?'block ':''}${sel==i?'sel ':''}${t.p?'pow ':''}${!t.h&&!t.block&&(goals[t.type]>0||t.type==levels[lvl][6])?'need ':''}' style='--bg:${BG[t.type]}'>${t.h?'×':t.block?({metal:'⚙️',vine:'🌿',ice:'🧊',crate:'📦'}[t.block]||'📦'):(t.p||'')+E[t.type]}</div>`).join('');document.querySelectorAll('.tile').forEach(x=>x.onclick=()=>tap(+x.dataset.i))}function tap(i){let t=B[i];if(mode!='play'||!t||t.h||t.block)return;if(sel==null){sel=i;drawBoard();return}let a=B[sel],d=Math.abs(a.c-t.c)+Math.abs(a.r-t.r);if(d!=1){sel=i;drawBoard();return}swap(a,t);moves--;surge--;if(a.p||t.p){power(a.p?a:t);sel=null;after();return}let m=matches();if(!m.size){swap(a,t);moves++;surge++;sel=null;say('No match — swap adjacent rescue tiles.');draw();return}resolve(m);sel=null;after()}function swap(a,b){[a.type,b.type]=[b.type,a.type];[a.p,b.p]=[b.p,a.p]}function matches(){let s=new Set;for(let r=0;r<7;r++)run(B.filter(t=>t.r==r).sort((a,b)=>a.c-b.c),s);for(let c=0;c<7;c++)run(B.filter(t=>t.c==c).sort((a,b)=>a.r-b.r),s);return s}function run(a,s){let q=[];for(let t of a){if(t.h||t.block||q.length&&q[0].type!=t.type){if(q.length>2)q.forEach(x=>s.add(x));q=t.h||t.block?[]:[t]}else q.push(t)}if(q.length>2)q.forEach(x=>s.add(x))}function collect(t,c){if(t.h)return;if(t.block){t.block='';score+=55;return}c[t.type]++;t.type=R(6);t.p=''}function apply(c,m=120){for(let k in goals){let v=Math.min(goals[k],c[k]);goals[k]-=v;score+=v*m}let hit=c[levels[lvl][6]];if(hit&&locks){locks=Math.max(0,locks-hit);score+=hit*(m+60)}}function resolve(s){let c=[0,0,0,0,0,0],big=s.size,first=[...s][0];s.forEach(t=>{c[t.type]++;t.type=R(6);t.p='';near(t).forEach(n=>{if(n.block&&R(2))n.block=''})});if(big>3)first.p=big>4?'🌈':'🚀';apply(c);score+=big*30;toast(big>4?'RAINBOW MADE!':big>3?'ROCKET MADE!':'+'+big);say(big+' rescue tiles cleared')}function power(t){let c=[0,0,0,0,0,0],p=t.p;t.p='';if(p=='🌈'){let typ=t.type;B.forEach(x=>{if(!x.h&&!x.block&&x.type==typ)collect(x,c)});say('🌈 Rainbow cleared every '+E[typ])}else{let row=R(2);B.forEach(x=>{if(row&&x.r==t.r||!row&&x.c==t.c)collect(x,c)});say('🚀 Rocket blasted the trap line')}apply(c,150);toast(p=='🌈'?'RAINBOW RESCUE!':'ROCKET BLAST!')}function after(){if(done())win();else{if(surge<=0)hazard();if(moves<=0)lose()}draw()}function hazard(){surge=4;$('scene').classList.add('shake');setTimeout(()=>$('scene').classList.remove('shake'),600);if(locks&&lvl%3)locks=Math.min(startLocks,locks+1);else B.filter(t=>!t.h&&!t.block).slice(0,2+Math.floor(lvl/4)).forEach(t=>t.block=levels[lvl][8]);moves=Math.max(0,moves-1);say('⚠ Hazard surge: '+levels[lvl][9]+'!')}function useTool(i){let k=['hammer','splash','key'][i];if(!tools[k]||mode!='play')return;tools[k]=0;if(k=='key'&&locks){locks--;score+=180;say('🔑 Key Ring opened one lock.')}else if(k=='hammer'){let t=B.find(x=>x.block&&!x.h)||B.find(x=>!x.h&&goals[x.type]>0);if(t){if(t.block)t.block='';else goals[t.type]=Math.max(0,goals[t.type]-1)}score+=140;say('🔨 Royal Hammer made progress.')}else{let c=0;B.sort(()=>Math.random()-.5).forEach(t=>{if(c<5&&!t.h&&!t.block&&(goals[t.type]>0||t.type==levels[lvl][6])){if(goals[t.type]>0)goals[t.type]--;if(t.type==levels[lvl][6]&&locks)locks--;t.type=R(6);c++}});score+=c*95;say('💧 Water Splash cleared '+c+' rescue tiles.')}after()}function near(t){return B.filter(n=>Math.abs(n.c-t.c)+Math.abs(n.r-t.r)==1)}function done(){return locks<1&&Object.values(goals).every(v=>v<1)}function win(){mode='won';let s=moves>8?3:moves>3?2:1;stars[lvl]=Math.max(stars[lvl]||0,s);unlocked=Math.max(unlocked,Math.min(levels.length,lvl+2));localStorage.krUnlock=unlocked;localStorage.krStars=JSON.stringify(stars);toast('KING SAVED!');say('⭐ King saved! Next rescue unlocked.')}function lose(){mode='lost';toast('TRY AGAIN');say('Danger reached the king — use rockets, tools, and goal tiles faster.')}function say(s){$('msg').textContent=s}function toast(s){let d=document.createElement('div');d.className='toast';d.textContent=s;document.body.appendChild(d);setTimeout(()=>d.remove(),850)}function showMap(){$('map').classList.toggle('show');drawMap()}function drawMap(){$('map').innerHTML=levels.map((l,i)=>`<div class='node ${i>=unlocked?'locked':''}' ${i<unlocked?`onclick='start(${i})'`:''}>${i+1}. ${l[1]} ${l[0]}<br>${i<unlocked?(stars[i]?'⭐'.repeat(stars[i]):'Play'):'Locked'}</div>`).join('')}window.start=start;window.showMap=showMap;window.useTool=useTool;window.__gameTest={start,showMap,useTool,forceWin:()=>{for(let k in goals)goals[k]=0;locks=0;win();draw()},forceSurge:()=>{hazard();draw()},getState:()=>({mode,lvl,levels:levels.length,name:levels[lvl][0],moves,goals,locks,unlocked,nextDisabled:$('next').disabled,hasMap:true,hasHazardSurge:true,hasPinPanel:true,hasRoyalTools:true,hasFunctionalPowerUps:true,hasCinematicMission:true,hasCampaignExpansion:true,grid:B.length})};start(0)})();</script></body></html>
